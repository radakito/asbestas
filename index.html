<!DOCTYPE html>
<html lang="es">
<head>

<title>As Bestas · Club de Cine</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --negro: #0d0d0d;
    --rojo: #c8382a;
    --rojo-hover: #a82e22;
    --crema: #f0ead8;
    --crema-oscura: #d9d0b8;
    --gris: #888;
    --gris-oscuro: #333;
    --borde: rgba(240,234,216,0.15);
    --font-display: 'Playfair Display', serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  body { background: var(--negro); color: var(--crema); font-family: var(--font-body); min-height: 100vh; font-size: 14px; }

  .header { border-bottom: 1px solid var(--borde); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; background: var(--negro); z-index: 100; }
  .logo { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--crema); letter-spacing: -0.5px; }
  .logo span { color: var(--rojo); }
  .temporada-badge { font-family: var(--font-mono); font-size: 11px; color: var(--gris); letter-spacing: 0.05em; }

  .nav { display: flex; gap: 0; border-bottom: 1px solid var(--borde); padding: 0 20px; overflow-x: auto; }
  .nav button { background: none; border: none; color: var(--gris); font-family: var(--font-body); font-size: 13px; padding: 14px 16px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.2s; }
  .nav button.active { color: var(--crema); border-bottom-color: var(--rojo); }
  .nav button:hover:not(.active) { color: var(--crema-oscura); }

  .main { padding: 24px 20px; max-width: 700px; margin: 0 auto; }
  .seccion-titulo { font-family: var(--font-mono); font-size: 10px; color: var(--gris); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }

  .peli-semana { display: grid; grid-template-columns: 100px 1fr; gap: 20px; margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid var(--borde); }
  .poster { width: 100px; height: 148px; background: var(--gris-oscuro); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .poster-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--gris); font-size: 11px; font-family: var(--font-mono); text-align: center; padding: 8px; }
  .peli-info { display: flex; flex-direction: column; justify-content: space-between; }
  .peli-etiqueta { font-family: var(--font-mono); font-size: 10px; color: var(--rojo); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .peli-titulo { font-family: var(--font-display); font-size: 20px; font-weight: 700; line-height: 1.2; color: var(--crema); margin-bottom: 6px; }
  .peli-meta { font-family: var(--font-mono); font-size: 11px; color: var(--gris); margin-bottom: 10px; line-height: 1.8; }
  .peli-meta a { color: var(--gris); text-decoration: none; border-bottom: 1px solid rgba(136,136,136,0.3); }
  .peli-meta a:hover { color: var(--crema-oscura); }

  .votos-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .voto-chip { font-family: var(--font-mono); font-size: 10px; padding: 3px 8px; border-radius: 2px; border: 1px solid var(--borde); color: var(--crema-oscura); }
  .voto-chip.pendiente { color: var(--gris); border-color: rgba(240,234,216,0.07); }
  .voto-chip.propio { border-color: var(--rojo); color: var(--crema); }

  .votar-btn { display: inline-block; background: var(--rojo); color: var(--crema); border: none; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.05em; padding: 10px 20px; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
  .votar-btn:hover { background: var(--rojo-hover); }
  .votar-btn:disabled { opacity: 0.4; cursor: default; background: var(--rojo); }
  .votos-estado { font-family: var(--font-mono); font-size: 11px; color: var(--gris); margin-bottom: 10px; }

  .historial-lista { display: flex; flex-direction: column; }
  .historial-item { display: grid; grid-template-columns: 36px 1fr auto; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--borde); cursor: pointer; transition: opacity 0.15s; }
  .historial-item:hover { opacity: 0.75; }
  .historial-num { font-family: var(--font-display); font-size: 24px; font-weight: 900; color: var(--rojo); line-height: 1; text-align: right; }
  .historial-titulo-item { font-family: var(--font-display); font-size: 15px; font-weight: 400; color: var(--crema); margin-bottom: 3px; }
  .historial-meta-item { font-family: var(--font-mono); font-size: 10px; color: var(--gris); }
  .historial-nota { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--crema); text-align: right; white-space: nowrap; }
  .historial-nota span { font-size: 10px; color: var(--gris); font-family: var(--font-mono); font-weight: 400; display: block; }

  .ranking-item { display: grid; grid-template-columns: 28px 54px 1fr auto; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--borde); }
  .ranking-pos { font-family: var(--font-mono); font-size: 12px; color: var(--gris); text-align: right; }

  .ranking-poster { width: 54px; height: 80px; background: var(--gris-oscuro); border-radius: 2px; overflow: hidden; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { border: 1px solid var(--borde); border-radius: 3px; padding: 16px; }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--gris); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-valor { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--crema); }

  .barra-item { margin-bottom: 12px; }

  .barra-label { font-family: var(--font-mono); font-size: 11px; color: var(--crema-oscura); }
  .barra-count { font-family: var(--font-mono); font-size: 11px; color: var(--gris); }
  .barra-track { height: 3px; background: rgba(240,234,216,0.1); border-radius: 2px; overflow: hidden; }

  .form-label { font-family: var(--font-mono); font-size: 10px; color: var(--gris); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .nombre-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 24px; }
  .nombre-btn { background: none; border: 1px solid var(--borde); color: var(--crema-oscura); font-family: var(--font-body); font-size: 13px; padding: 10px 8px; border-radius: 2px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .nombre-btn.selected { border-color: var(--rojo); color: var(--crema); background: rgba(200,56,42,0.12); }
  .nombre-btn.ya-voto { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }
  .nota-display { font-family: var(--font-display); font-size: 64px; font-weight: 900; color: var(--crema); text-align: center; margin: 8px 0; line-height: 1; }
  input[type=range] { width: 100%; accent-color: var(--rojo); margin-bottom: 4px; }
  .nota-ticks { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .nota-tick { font-family: var(--font-mono); font-size: 9px; color: var(--gris); }
  .confirmar-btn { width: 100%; background: var(--rojo); color: var(--crema); border: none; font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.05em; padding: 14px; cursor: pointer; border-radius: 2px; transition: background 0.2s; margin-bottom: 10px; }
  .confirmar-btn:hover:not(:disabled) { background: var(--rojo-hover); }

  .cancelar-btn { width: 100%; background: none; border: none; color: var(--gris); font-family: var(--font-mono); font-size: 12px; padding: 8px; cursor: pointer; }

  .search-input { width: 100%; background: #1e1e1e; border: 1px solid var(--borde); color: var(--crema); font-family: var(--font-body); font-size: 14px; padding: 12px 14px; border-radius: 2px; outline: none; margin-bottom: 12px; }
  .search-input:focus { border-color: rgba(240,234,216,0.35); }
  .search-input::placeholder { color: var(--gris); }
  .search-results { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
  .search-result-item { display: grid; grid-template-columns: 44px 1fr; gap: 12px; padding: 10px; border: 1px solid var(--borde); border-radius: 2px; cursor: pointer; transition: border-color 0.15s; align-items: center; }
  .search-result-item:hover { border-color: rgba(240,234,216,0.35); }

  .search-result-poster img { width: 100%; height: 100%; object-fit: cover; }
  .search-result-titulo { font-family: var(--font-display); font-size: 14px; color: var(--crema); margin-bottom: 3px; }
  .search-result-meta { font-family: var(--font-mono); font-size: 10px; color: var(--gris); }
  .date-input { width: 100%; background: #1e1e1e; border: 1px solid var(--borde); color: var(--crema); font-family: var(--font-mono); font-size: 13px; padding: 10px 14px; border-radius: 2px; outline: none; margin-bottom: 16px; }
  .date-input:focus { border-color: rgba(240,234,216,0.35); }

  /* ADMIN */
  .admin-section { margin-bottom: 28px; }

  .miembro-nombre { font-family: var(--font-body); font-size: 14px; color: var(--crema); }
  .miembro-acciones { display: flex; gap: 8px; }
  .btn-small { background: none; border: 1px solid var(--borde); color: var(--gris); font-family: var(--font-mono); font-size: 11px; padding: 5px 10px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
  .btn-small:hover { border-color: var(--rojo); color: var(--rojo); }

  .add-miembro-row input:focus { border-color: rgba(240,234,216,0.35); }
  .add-miembro-row button { background: var(--rojo); color: var(--crema); border: none; font-family: var(--font-mono); font-size: 12px; padding: 9px 16px; border-radius: 2px; cursor: pointer; white-space: nowrap; }

  .detalle-votos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .detalle-voto-card { border: 1px solid var(--borde); border-radius: 2px; padding: 12px; text-align: center; }
  .detalle-voto-nombre { font-family: var(--font-mono); font-size: 10px; color: var(--gris); margin-bottom: 4px; }
  .detalle-voto-nota { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--crema); }
  .detalle-media { text-align: center; padding: 24px 0; border-top: 1px solid var(--borde); border-bottom: 1px solid var(--borde); margin-bottom: 20px; }
  .detalle-media-num { font-family: var(--font-display); font-size: 72px; font-weight: 900; color: var(--crema); line-height: 1; }
  .detalle-media-label { font-family: var(--font-mono); font-size: 11px; color: var(--gris); margin-top: 4px; }
  .back-btn { background: none; border: none; color: var(--gris); font-family: var(--font-mono); font-size: 11px; padding: 0 0 20px 0; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .back-btn:hover { color: var(--crema); }

  /* LOADER */
  .loader { text-align: center; padding: 40px 0; font-family: var(--font-mono); font-size: 12px; color: var(--gris); }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid var(--borde); color: var(--crema); font-family: var(--font-mono); font-size: 12px; padding: 12px 20px; border-radius: 2px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.visible { opacity: 1; }

  .empty-state { text-align: center; padding: 48px 0; font-family: var(--font-mono); font-size: 12px; color: var(--gris); line-height: 2; }

  .hidden { display: none !important; }
  .fab { position: fixed; bottom: 24px; right: 20px; background: var(--rojo); color: var(--crema); border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(200,56,42,0.4); transition: background 0.2s; }
  .fab:hover { background: var(--rojo-hover); }
</style>
</head>

<script>
const SUPABASE_URL = 'https://vzklyzbphcfxfuqevnui.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2x5emJwaGNmeGZ1cWV2bnVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTY3NjcsImV4cCI6MjA5NjEzMjc2N30.7Ux4I8Wyg8WN-hMRTIM8daAoeyl-na4pkRbtTWDpT3M';
const TMDB_KEY = '12e800990f66a67d30314bf0b48dcb72';
const TMDB_IMG = 'https://image.tmdb.org/t/p/w200';

let miembros = [];
let peliculas = [];
let votos = [];
let peliActual = null;
let tmdbSeleccionado = null;
let nombreVotante = null;
let searchTimeout = null;

// ---- SUPABASE ----
async function db(tabla, opts = {}) {
  let url = `${SUPABASE_URL}/rest/v1/${tabla}`;
  const params = [];
  if (opts.select) params.push(`select=${opts.select}`);
  if (opts.filter) params.push(opts.filter);
  if (opts.order) params.push(`order=${opts.order}`);
  if (params.length) url += '?' + params.join('&');

  const res = await fetch(url, {
    method: opts.method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.method === 'POST' ? 'return=representation' : ''
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return opts.method === 'DELETE' ? null : res.json();
}

// ---- CARGAR DATOS ----
async function cargarTodo() {
  try {
    [miembros, peliculas, votos] = await Promise.all([
      db('miembros', { filter: 'activo=eq.true', order: 'nombre.asc' }),
      db('peliculas', { order: 'fecha_sesion.desc.nullslast,creado_en.desc' }),
      db('votos', { select: '*' })
    ]);
    peliActual = peliculas[0] || null;
    renderEstaSemana();
    renderHistorial();
    renderRanking();
    renderEstadisticas();
    renderAdmin();
  } catch(e) {
    toast('Error cargando datos: ' + e.message);
  }
}

// ---- HELPERS ----
function votosDeP(pelId) { return votos.filter(v => v.pelicula_id === pelId); }
function mediaDeP(pelId) {
  const vv = votosDeP(pelId);
  if (!vv.length) return null;
  return (vv.reduce((a,b) => a + b.nota, 0) / vv.length).toFixed(1);
}
function nombreMiembro(id) { return (miembros.find(m => m.id === id) || {}).nombre || '?'; }
function formatFecha(d) {
  if (!d) return '—';
  const f = new Date(d + 'T12:00:00');
  return f.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'long' });
}

// ---- RENDER ESTA SEMANA ----
function renderEstaSemana() {
  const el = document.getElementById('esta-semana-content');
  if (!peliActual) {
    el.innerHTML = `<div class="empty-state">No hay ninguna película esta semana.<br>Añade una desde Admin.</div>`;
    return;
  }
  const vv = votosDeP(peliActual.id);
  const media = mediaDeP(peliActual.id);
  const miembrosActivos = miembros.filter(m => m.activo);
  const yaVotaron = new Set(vv.map(v => v.miembro_id));

  const chipsHTML = miembrosActivos.map(m => {

    : '';

  el.innerHTML = `
    <div class="peli-semana">
      <div class="poster">
        ${peliActual.poster_url
          ? `<img src="${peliActual.poster_url}" alt="${peliActual.titulo}">`
          : `<div class="poster-placeholder">${peliActual.titulo}</div>`}
      </div>
      <div class="peli-info">
        <div>
          <div class="peli-etiqueta">${peliActual.fecha_sesion ? formatFecha(peliActual.fecha_sesion) : 'Esta semana'}</div>
          <div class="peli-titulo">${peliActual.titulo}</div>
          <div class="peli-meta">
            ${peliActual.director ? peliActual.director + ' · ' : ''}${peliActual.anio || ''}${peliActual.pais ? ' · ' + peliActual.pais : ''}<br>
            ${faLink}
          </div>
          <div class="votos-grid">${chipsHTML}</div>
        </div>
        <div>
          <div class="votos-estado">${vv.length} voto${vv.length !== 1 ? 's' : ''} · media: <strong style="color:var(--crema)">${media || '—'}</strong></div>
          <button class="votar-btn" onclick="abrirModalVotar('${peliActual.id}')">Votar esta película</button>
        </div>
      </div>
    </div>
    <div class="seccion-titulo">Últimas sesiones</div>
    <div class="historial-lista">
      ${peliculas.slice(1, 5).map((p, i) => {
        const m = mediaDeP(p.id);
        const vv2 = votosDeP(p.id);
        return `<div class="historial-item" onclick="abrirDetalle('${p.id}')">

      }).join('')}

}

// ---- RENDER RANKING ----
function renderRanking() {
  const el = document.getElementById('ranking-content');
  const pelConMedia = peliculas
    .map(p => ({ ...p, media: mediaDeP(p.id), nVotos: votosDeP(p.id).length }))
    .filter(p => p.media !== null && p.nVotos >= 2)
    .sort((a, b) => parseFloat(b.media) - parseFloat(a.media));

  if (!pelConMedia.length) {
    el.innerHTML = `<div class="empty-state">Aún no hay suficientes votos para el ranking.<br>Se necesitan mínimo 2 votos por película.</div>`;
    return;
  }

  el.innerHTML = `
    <div class="seccion-titulo">Ranking · temporada 2024–25</div>
    <div class="historial-lista">
      ${pelConMedia.map((p, i) => `
        <div class="ranking-item" onclick="abrirDetalle('${p.id}')" style="cursor:pointer">
          <div class="ranking-pos ${i < 3 ? 'top' : ''}">${i + 1}</div>
          <div class="ranking-poster">
            ${p.poster_url ? `<img src="${p.poster_url}" alt="${p.titulo}">` : ''}
          </div>
          <div>
            <div class="historial-titulo-item">${p.titulo}</div>
            <div class="historial-meta-item">${p.director || ''}${p.anio ? ' · ' + p.anio : ''}</div>
          </div>
          <div class="historial-nota">${p.media}<span>${p.nVotos} votos</span></div>
        </div>`).join('')}
    </div>`;
}

// ---- RENDER ESTADÍSTICAS ----
function renderEstadisticas() {
  const el = document.getElementById('estadisticas-content');
  if (!peliculas.length) {
    el.innerHTML = `<div class="empty-state">Sin datos aún.</div>`;
    return;
  }

  const totalVotos = votos.length;
  const medias = peliculas.map(p => parseFloat(mediaDeP(p.id))).filter(m => !isNaN(m));
  const mediaTemp = medias.length ? (medias.reduce((a,b)=>a+b,0)/medias.length).toFixed(1) : '—';
  const mejorNota = medias.length ? Math.max(...medias).toFixed(1) : '—';

  // Países
  const paises = {};
  peliculas.forEach(p => { if (p.pais) { paises[p.pais] = (paises[p.pais]||0)+1; } });
  const paisesOrdenados = Object.entries(paises).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxPais = paisesOrdenados[0]?.[1] || 1;

  // Décadas
  const decadas = {};
  peliculas.forEach(p => {
    if (p.anio) {
      const d = Math.floor(p.anio/10)*10;
      const label = d >= 2020 ? '2020s' : d >= 2010 ? '2010s' : d >= 2000 ? '2000s' : d >= 1990 ? '1990s' : 'Clásicos';
      decadas[label] = (decadas[label]||0)+1;
    }
  });
  const decadasOrdenadas = Object.entries(decadas).sort((a,b)=>b[1]-a[1]);
  const maxDecada = decadasOrdenadas[0]?.[1] || 1;

  // Géneros
  const generos = {};
  peliculas.forEach(p => {
    if (p.genero) {
      p.genero.split(',').forEach(g => {
        const gt = g.trim();
        if (gt) generos[gt] = (generos[gt]||0)+1;
      });
    }
  });
  const generosOrdenados = Object.entries(generos).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxGenero = generosOrdenados[0]?.[1] || 1;

  el.innerHTML = `
    <div class="seccion-titulo">Temporada 2024–25</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Películas vistas</div><div class="stat-valor">${peliculas.length}</div></div>
      <div class="stat-card"><div class="stat-label">Media temporada</div><div class="stat-valor">${mediaTemp}</div></div>
      <div class="stat-card"><div class="stat-label">Mejor nota</div><div class="stat-valor">${mejorNota}</div></div>
      <div class="stat-card"><div class="stat-label">Votos totales</div><div class="stat-valor">${totalVotos}</div></div>
    </div>
    ${paisesOrdenados.length ? `
    <div style="margin-bottom:24px">
      <div class="seccion-titulo">Por país</div>
      ${paisesOrdenados.map(([p,n]) => `
        <div class="barra-item">
          <div class="barra-label-row"><span class="barra-label">${p}</span><span class="barra-count">${n}</span></div>
          <div class="barra-track"><div class="barra-fill" style="width:${Math.round(n/maxPais*100)}%"></div></div>
        </div>`).join('')}
    </div>` : ''}
    ${decadasOrdenadas.length ? `
    <div style="margin-bottom:24px">
      <div class="seccion-titulo">Por década</div>
      ${decadasOrdenadas.map(([d,n]) => `
        <div class="barra-item">
          <div class="barra-label-row"><span class="barra-label">${d}</span><span class="barra-count">${n}</span></div>
          <div class="barra-track"><div class="barra-fill" style="width:${Math.round(n/maxDecada*100)}%"></div></div>
        </div>`).join('')}
    </div>` : ''}
    ${generosOrdenados.length ? `
    <div>
      <div class="seccion-titulo">Por género</div>
      ${generosOrdenados.map(([g,n]) => `
        <div class="barra-item">
          <div class="barra-label-row"><span class="barra-label">${g}</span><span class="barra-count">${n}</span></div>
          <div class="barra-track"><div class="barra-fill" style="width:${Math.round(n/maxGenero*100)}%"></div></div>
        </div>`).join('')}
    </div>` : ''}`;
}

// ---- MODAL VOTAR ----
function abrirModalVotar(pelId) {
  const p = peliculas.find(x => x.id === pelId);
  if (!p) return;
  peliActual = p;
  nombreVotante = null;
  const vv = votosDeP(pelId);
  const yaVotaron = new Set(vv.map(v => v.miembro_id));

  document.getElementById('modal-votar-titulo').textContent = p.titulo;
  document.getElementById('modal-votar-subtitulo').textContent =
    (p.director || '') + (p.anio ? ' · ' + p.anio : '') + (p.fecha_sesion ? ' · ' + formatFecha(p.fecha_sesion) : '');
  document.getElementById('nota-slider').value = 7;
  document.getElementById('nota-display').textContent = '7';
  document.getElementById('confirmar-voto-btn').disabled = true;

  document.getElementById('modal-nombres').innerHTML = miembros.map(m => {
    const yaVoto = yaVotaron.has(m.id);
    return `<button class="nombre-btn ${yaVoto ? 'ya-voto' : ''}"
      onclick="${yaVoto ? '' : `seleccionarNombre(this,'${m.id}')`}"
      title="${yaVoto ? 'Ya votó' : m.nombre}">
      ${m.nombre}${yaVoto ? ' ✓' : ''}
    </button>`;
  }).join('');

  document.getElementById('modal-votar').classList.remove('hidden');
}

function seleccionarNombre(btn, id) {
  document.querySelectorAll('#modal-nombres .nombre-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  nombreVotante = id;
  document.getElementById('confirmar-voto-btn').disabled = false;
}

async function confirmarVoto() {
  if (!nombreVotante || !peliActual) return;
  const nota = parseInt(document.getElementById('nota-slider').value);
  const btn = document.getElementById('confirmar-voto-btn');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  try {
    await db('votos', {
      method: 'POST',
      body: { pelicula_id: peliActual.id, miembro_id: nombreVotante, nota }
    });
    cerrarModal('modal-votar');
    toast('Voto registrado: ' + nota + '/10');
    await cargarTodo();
  } catch(e) {
    toast('Error: puede que ya hayas votado');
    btn.disabled = false;
    btn.textContent = 'Confirmar voto';
  }
}

// ---- MODAL AÑADIR PELÍCULA ----
function abrirModalAniadir() {
  tmdbSeleccionado = null;
  document.getElementById('tmdb-search').value = '';
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('confirmar-aniadir-btn').disabled = true;
  // Set today as default date
  document.getElementById('fecha-sesion').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-aniadir').classList.remove('hidden');
}

function buscarTMDB(q) {
  clearTimeout(searchTimeout);
  if (q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
  searchTimeout = setTimeout(async () => {
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=es-ES`);
    const data = await res.json();
    const el = document.getElementById('search-results');
    if (!data.results?.length) { el.innerHTML = '<div style="font-family:var(--font-mono);font-size:11px;color:var(--gris);padding:8px">Sin resultados</div>'; return; }
    el.innerHTML = data.results.slice(0,6).map(r => `
      <div class="search-result-item" onclick="seleccionarTMDB(this, ${r.id}, '${escStr(r.title)}', '${escStr(r.release_date||'')}', '${escStr(r.poster_path||'')}')">
        <div class="search-result-poster">
          ${r.poster_path ? `<img src="${TMDB_IMG}${r.poster_path}" alt="${escStr(r.title)}">` : ''}
        </div>
        <div>
          <div class="search-result-titulo">${r.title}</div>
          <div class="search-result-meta">${r.release_date ? r.release_date.substring(0,4) : '—'}</div>
        </div>
      </div>`).join('');
  }, 350);
}

function escStr(s) { return String(s).replace(/'/g,"&#39;").replace(/"/g,"&quot;"); }

function seleccionarTMDB(el, id, titulo, fecha, poster) {
  document.querySelectorAll('.search-result-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  tmdbSeleccionado = { id, titulo, fecha, poster };
  document.getElementById('confirmar-aniadir-btn').disabled = false;
}

async function confirmarAniadir() {
  if (!tmdbSeleccionado) return;
  const btn = document.getElementById('confirmar-aniadir-btn');
  btn.disabled = true;
  btn.textContent = 'Buscando detalles...';

  try {
    // Fetch full movie details from TMDB
    const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbSeleccionado.id}?api_key=${TMDB_KEY}&language=es-ES&append_to_response=credits`);
    const d = await res.json();

    const director = d.credits?.crew?.find(c => c.job === 'Director')?.name || '';
    const paises = d.production_countries?.map(c => c.name).join(', ') || '';
    const generos = d.genres?.map(g => g.name).join(', ') || '';
    const anio = d.release_date ? parseInt(d.release_date.substring(0,4)) : null;
    const posterUrl = d.poster_path ? `${TMDB_IMG}${d.poster_path}` : null;
    const faUrl = `https://www.filmaffinity.com/es/search.php?stype=title&stext=${encodeURIComponent(d.title)}`;
    const fechaSesion = document.getElementById('fecha-sesion').value || null;
    const nSesion = peliculas.length + 1;

    await db('peliculas', {
      method: 'POST',
      body: {
        titulo: d.title,
        director,
        anio,
        pais: paises,
        genero: generos,
        sinopsis: d.overview || '',
        poster_url: posterUrl,
        tmdb_id: d.id,
        filmaffinity_url: faUrl,
        fecha_sesion: fechaSesion,
        numero_sesion: nSesion,
        temporada: '2024-25'
      }
    });

    cerrarModal('modal-aniadir');
    toast('Película añadida: ' + d.title);
    await cargarTodo();
  } catch(e) {
    toast('Error añadiendo película');
    btn.disabled = false;
    btn.textContent = 'Añadir al club';
  }
}

// ---- DETALLE PELÍCULA ----
async function abrirDetalle(pelId) {
  const p = peliculas.find(x => x.id === pelId);
  if (!p) return;
  const vv = votosDeP(pelId);
  const media = mediaDeP(pelId);

  const votosHTML = miembros.map(m => {
    const v = vv.find(x => x.miembro_id === m.id);
    return `<div class="detalle-voto-card">
      <div class="detalle-voto-nombre">${m.nombre}</div>
      <div class="detalle-voto-nota" style="${!v ? 'color:var(--gris)' : ''}">${v ? v.nota : '—'}</div>
    </div>`;
  }).join('');

  const faLink = p.filmaffinity_url
    ? `<a href="${p.filmaffinity_url}" target="_blank" style="color:var(--gris);font-family:var(--font-mono);font-size:11px;border-bottom:1px solid rgba(136,136,136,0.3)">Ver en FilmAffinity ↗</a>`
    : '';

  document.getElementById('modal-detalle-content').innerHTML = `
    <button class="back-btn" onclick="cerrarModal('modal-detalle')">← Volver</button>
    <div class="detalle-header">
      <div class="poster">
        ${p.poster_url ? `<img src="${p.poster_url}" alt="${p.titulo}">` : `<div class="poster-placeholder">${p.titulo}</div>`}
      </div>
      <div>
        <div class="peli-etiqueta">${p.fecha_sesion ? formatFecha(p.fecha_sesion) : ''}</div>
        <div class="peli-titulo">${p.titulo}</div>
        <div class="peli-meta" style="margin-bottom:12px">
          ${p.director ? p.director + '<br>' : ''}
          ${p.anio || ''}${p.pais ? ' · ' + p.pais : ''}<br>
          ${p.genero || ''}
        </div>
        ${faLink}
      </div>
    </div>
    ${media ? `<div class="detalle-media"><div class="detalle-media-num">${media}</div><div class="detalle-media-label">${vv.length} votos · media</div></div>` : ''}
    <div class="seccion-titulo" style="margin-top:16px">Votos del grupo</div>
    <div class="detalle-votos-grid">${votosHTML}</div>
    <button class="votar-btn" style="width:100%;text-align:center;margin-top:8px" onclick="cerrarModal('modal-detalle');abrirModalVotar('${p.id}')">Votar esta película</button>`;

  document.getElementById('modal-detalle').classList.remove('hidden');
}

// ---- MIEMBROS ----
async function añadirMiembro() {
  const input = document.getElementById('nuevo-miembro-input');
  const nombre = input.value.trim();
  if (!nombre) return;
  try {
    await db('miembros', { method: 'POST', body: { nombre } });
    input.value = '';
    toast(nombre + ' añadido al grupo');
    await cargarTodo();
  } catch(e) {
    toast('Error: ese nombre ya existe');
  }
}

async function eliminarMiembro(id, nombre) {
  if (!confirm(`¿Eliminar a ${nombre} del grupo?`)) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/miembros?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    toast(nombre + ' eliminado');
    await cargarTodo();
  } catch(e) {
    toast('Error eliminando miembro');
  }
}

// ---- NAV ----
function mostrarSeccion(id, btn) {
  document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('fab-añadir').classList.toggle('hidden', id !== 'admin');
}

// ---- UTILS ----
function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }
function cerrarSiOverlay(e, id) { if (e.target.id === id) cerrarModal(id); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3000);
}

// ---- INIT ----
cargarTodo();
