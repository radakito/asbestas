function openAddModal(){
  tmdbSel=null;
  document.getElementById('add-search').value='';
  document.getElementById('add-results').innerHTML='';
  document.getElementById('add-ok').classList.add('off');
  document.getElementById('add-fa').value='';
  document.getElementById('add-fecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('add-manual').classList.add('off');
  showModal('m-add');
}
document.getElementById('add-cancel').addEventListener('click',()=>{
  hideModal('m-add');
  document.getElementById('add-ok').dataset.mode='normal';
  document.getElementById('add-ok').textContent='Añadir al club';
  document.querySelector('#m-add .modal-title').textContent='Añadir película';
  document.querySelector('#m-add .modal-sub').textContent='Busca en TMDB o introduce manualmente';
  document.getElementById('festival-comment-wrap')?.remove();
});
document.getElementById('m-add').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideModal('m-add'); });
document.getElementById('add-manual-toggle').addEventListener('click',()=>document.getElementById('add-manual').classList.toggle('off'));
document.getElementById('add-search').addEventListener('input',function(){
  clearTimeout(searchTO);
  const q=this.value; if(q.length<2){ document.getElementById('add-results').innerHTML=''; return; }
  searchTO=setTimeout(async()=>{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TK}&query=${encodeURIComponent(q)}&language=es-ES`);
    const d=await r.json(); const el=document.getElementById('add-results'); el.innerHTML='';
    if(!d.results?.length){ el.innerHTML='<div style="font-family:var(--fm);font-size:11px;color:var(--gris);padding:8px">Sin resultados</div>'; return; }
    d.results.slice(0,6).forEach(item=>{
      const div=document.createElement('div'); div.className='s-item';
      div.innerHTML=`<div class="s-poster">${item.poster_path?`<img src="${TI}${item.poster_path}" alt="">`:''}</div><div><div style="font-family:var(--fd);font-size:14px">${esc(item.title)}</div><div style="font-family:var(--fm);font-size:10px;color:var(--gris)">${item.release_date?item.release_date.substring(0,4):'—'}</div></div>`;
      div.addEventListener('click',()=>{
        document.querySelectorAll('.s-item').forEach(x=>x.classList.remove('sel'));
        div.classList.add('sel'); tmdbSel=item;
        document.getElementById('add-ok').classList.remove('off');
      });
      el.appendChild(div);
    });
  },350);
});
document.getElementById('add-ok').addEventListener('click', async()=>{
  if(!tmdbSel) return;
  const btn=document.getElementById('add-ok'); btn.disabled=true;
  const mode=btn.dataset.mode||'normal';
  const origText=btn.textContent; btn.textContent='Buscando...';
  try{
    const r=await fetch(`https://api.themoviedb.org/3/movie/${tmdbSel.id}?api_key=${TK}&language=es-ES&append_to_response=credits`);
    const d=await r.json();
    const director=d.credits?.crew?.find(c=>c.job==='Director')?.name||'';
    const pais=d.production_countries?.length?d.production_countries[0].name:'';
    const generos=d.genres?.map(g=>g.name).join(', ')||'';
    const anio=d.release_date?parseInt(d.release_date.substring(0,4)):null;
    const posterUrl=d.poster_path?`${TI}${d.poster_path}`:null;

    if(mode==='festival'){
      const comentario=document.getElementById('festival-comment')?.value.trim()||'';
      await dbPost('festival_props',{miembro_id:ME.id,titulo:d.title,director,anio,duracion:d.runtime||null,poster_url:posterUrl,tmdb_id:d.id,comentario});
      hideModal('m-add'); toast('Propuesta añadida: '+d.title);
      // Reset modal
      btn.dataset.mode='normal'; btn.textContent='Añadir al club';
      document.querySelector('#m-add .modal-title').textContent='Añadir película';
      document.querySelector('#m-add .modal-sub').textContent='Busca en TMDB o introduce manualmente';
      document.getElementById('festival-comment-wrap')?.remove();
    } else {
      const faManual=document.getElementById('add-fa').value.trim();
      const faUrl=faManual||`https://www.filmaffinity.com/es/search.php?stype=title&stext=${encodeURIComponent(d.title)}`;
      await dbPost('peliculas',{titulo:d.title,director,anio,pais,genero:generos,sinopsis:d.overview||'',poster_url:posterUrl,tmdb_id:d.id,filmaffinity_url:faUrl,fecha_sesion:document.getElementById('add-fecha').value||null,numero_sesion:D.pelis.length+1,temporada:TEMPORADA,duracion:d.runtime||null});
      hideModal('m-add'); toast('Añadida: '+d.title);
    }
    await loadAll(); renderAll();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; btn.textContent=origText; }
});
document.getElementById('m-ok').addEventListener('click', async()=>{
  const titulo=document.getElementById('m-titulo').value.trim(); if(!titulo){ toast('El título es obligatorio'); return; }
  const btn=document.getElementById('m-ok'); btn.disabled=true; btn.textContent='Guardando...';
  try{
    await dbPost('peliculas',{titulo,director:document.getElementById('m-dir').value.trim()||null,anio:parseInt(document.getElementById('m-anio').value)||null,pais:document.getElementById('m-pais').value.trim()||null,genero:document.getElementById('m-genero').value.trim()||null,duracion:parseInt(document.getElementById('m-dur').value)||null,poster_url:document.getElementById('m-poster').value.trim()||null,filmaffinity_url:document.getElementById('add-fa').value.trim()||null,fecha_sesion:document.getElementById('add-fecha').value||null,numero_sesion:D.pelis.length+1,temporada:TEMPORADA});
    hideModal('m-add'); toast('Añadida: '+titulo);
    await loadAll(); renderAll();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; btn.textContent='Añadir manualmente'; }
});

// ============ ADMIN ============
function renderAdmin(){
  const el=document.getElementById('admin'); el.innerHTML='';

  // Ranking reveal control
  const revealed=(D.rc||[]).find(x=>x.key==='revealed')?.value==='true';
  const festRevealed=(D.fc||[]).find(x=>x.key==='revealed')?.value==='true';
  const rankSec=document.createElement('div'); rankSec.style.marginBottom='32px';
  const rankLbl=document.createElement('div'); rankLbl.className='sec-label'; rankLbl.textContent='Control del ranking'; rankSec.appendChild(rankLbl);
  const rankInfo=document.createElement('div'); rankInfo.style.cssText='font-family:var(--fm);font-size:11px;color:var(--gris);margin-bottom:12px';
  rankInfo.textContent=revealed?'El ranking es visible para todos los miembros.':'El ranking está oculto. Solo tú puedes verlo.';
  rankSec.appendChild(rankInfo);
  const revBtn=document.createElement('button'); revBtn.className='btn-rojo';
  revBtn.textContent=revealed?'🔒 Ocultar ranking':'🎬 Revelar ranking al grupo';
  revBtn.addEventListener('click', async()=>{
    try{
      await fetch(`${SB}/rest/v1/ranking_config?key=eq.revealed`,{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
      await dbPost('ranking_config',{key:'revealed',value:revealed?'false':'true'});
      toast(revealed?'Ranking ocultado':'¡Ranking revelado al grupo!');
      await loadAll(); renderAll();
    }catch(e){ toast('Error: '+e.message); }
  });
  rankSec.appendChild(revBtn); el.appendChild(rankSec);

  // Festival ranking reveal
  const festSec=document.createElement('div'); festSec.style.marginBottom='32px';
  const festLbl=document.createElement('div'); festLbl.className='sec-label'; festLbl.textContent='Control ranking · Fin de curso'; festSec.appendChild(festLbl);
  const festInfo=document.createElement('div'); festInfo.style.cssText='font-family:var(--fm);font-size:11px;color:var(--gris);margin-bottom:12px';
  festInfo.textContent=festRevealed?'Ranking de fin de curso visible para todos.':'Ranking de fin de curso oculto.';
  festSec.appendChild(festInfo);
  const festRevBtn=document.createElement('button'); festRevBtn.className='btn-rojo';
  festRevBtn.textContent=festRevealed?'🔒 Ocultar ranking fin de curso':'🎬 Revelar ranking fin de curso';
  festRevBtn.addEventListener('click', async()=>{
    try{
      await fetch(`${SB}/rest/v1/festival_config?key=eq.revealed`,{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
      await dbPost('festival_config',{key:'revealed',value:festRevealed?'false':'true'});
      toast(festRevealed?'Ranking ocultado':'¡Ranking fin de curso revelado!');
      await loadAll(); renderAll();
    }catch(e){ toast('Error: '+e.message); }
  });
  festSec.appendChild(festRevBtn); el.appendChild(festSec);

  // Miembros
  const mh=document.createElement('div'); mh.className='sec-label'; mh.textContent='Miembros del grupo'; el.appendChild(mh);
  D.miembros.forEach(m=>{
    const row=document.createElement('div'); row.className='m-item';
    row.innerHTML=`<span style="font-family:var(--fb)">${esc(m.nombre)}</span><div style="display:flex;gap:8px">`;
    const rBtn=document.createElement('button'); rBtn.className='btn-sm'; rBtn.textContent='Reset PIN';
    rBtn.addEventListener('click', async()=>{ if(confirm('¿Resetear PIN de '+m.nombre+'?')){ await dbPatch('miembros',`id=eq.${m.id}`,{pin:null}); toast('PIN reseteado'); }});
    const dBtn=document.createElement('button'); dBtn.className='btn-sm'; dBtn.textContent='Eliminar';
    dBtn.addEventListener('click', async()=>{ if(confirm('¿Eliminar a '+m.nombre+'?')){ await dbDel('miembros',`id=eq.${m.id}`); toast(m.nombre+' eliminado'); await loadAll(); renderAdmin(); }});
    const div=row.querySelector('div'); div.appendChild(rBtn); div.appendChild(dBtn); el.appendChild(row);
  });
  const addRow=document.createElement('div'); addRow.className='add-row'; addRow.style.marginBottom='32px';
  const inp=document.createElement('input'); inp.placeholder='Nombre nuevo miembro';
  const addBtn=document.createElement('button'); addBtn.textContent='Añadir';
  addBtn.addEventListener('click', async()=>{
    const n=inp.value.trim(); if(!n) return;
    try{ await dbPost('miembros',{nombre:n,activo:true}); inp.value=''; toast(n+' añadido'); await loadAll(); renderAdmin(); }catch(e){ toast('Error: ese nombre ya existe'); }
  });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') addBtn.click(); });
  addRow.appendChild(inp); addRow.appendChild(addBtn); el.appendChild(addRow);

  // Películas
  const ph=document.createElement('div'); ph.className='sec-label'; ph.textContent='Películas de la temporada'; el.appendChild(ph);
  const addPBtn=document.createElement('button'); addPBtn.className='btn-rojo'; addPBtn.textContent='+ Añadir película'; addPBtn.style.marginBottom='16px';
  addPBtn.addEventListener('click',openAddModal); el.appendChild(addPBtn);

  [...D.pelis].reverse().forEach((p,i)=>{
    const num=D.pelis.length-i;
    const wrap=document.createElement('div');
    const row=document.createElement('div'); row.className='h-item'; row.style.cursor='pointer';
    row.innerHTML=`<div class="h-num">${num}</div><div><div class="h-title">${esc(p.titulo)}</div><div class="h-meta">${p.fecha_sesion?fmtFecha(p.fecha_sesion):'Sin fecha'}</div></div><div style="font-family:var(--fm);font-size:11px;color:var(--gris)">editar ›</div>`;
    const editBox=document.createElement('div'); editBox.className='edit-box off';

    // Edit fields
    const fields=[
      ['Título','ef-titulo',p.titulo,'text'],['Director/a','ef-dir',p.director||'','text'],
      ['Fecha','ef-fecha',p.fecha_sesion||'','date'],['País principal','ef-pais',p.pais||'','text'],
      ['Nota FilmAffinity','ef-fanota',p.fa_nota||'','number'],['Enlace FilmAffinity','ef-fa',p.filmaffinity_url||'','text']
    ];
    fields.forEach(([lbl,id,val,type])=>{
      const l=document.createElement('label'); l.className='form-lbl'; l.style.marginTop='8px'; l.textContent=lbl; editBox.appendChild(l);
      const inp2=document.createElement('input'); inp2.id=id+'-'+p.id; inp2.value=val; inp2.type=type; if(type==='number') inp2.step='0.1';
      editBox.appendChild(inp2);
    });

    // Género director select
    const gl=document.createElement('label'); gl.className='form-lbl'; gl.textContent='Género director/a'; editBox.appendChild(gl);
    const sel=document.createElement('select'); sel.id='ef-gendir-'+p.id;
    [['','Sin dato'],['M','Director (hombre)'],['F','Directora (mujer)']].forEach(([v,t])=>{
      const o=document.createElement('option'); o.value=v; o.textContent=t; if((p.genero_director||'')=== v) o.selected=true; sel.appendChild(o);
    });
    editBox.appendChild(sel);

    const eRow=document.createElement('div'); eRow.className='edit-row';
    const sv=document.createElement('button'); sv.className='sv'; sv.textContent='Guardar';
    sv.addEventListener('click', async()=>{
      try{
        const fanota=parseFloat(document.getElementById('ef-fanota-'+p.id).value)||null;
        await dbPatch('peliculas',`id=eq.${p.id}`,{
          titulo:document.getElementById('ef-titulo-'+p.id).value.trim(),
          director:document.getElementById('ef-dir-'+p.id).value.trim()||null,
          fecha_sesion:document.getElementById('ef-fecha-'+p.id).value||null,
          pais:document.getElementById('ef-pais-'+p.id).value.trim()||null,
          fa_nota:fanota,
          filmaffinity_url:document.getElementById('ef-fa-'+p.id).value.trim()||null,
          genero_director:document.getElementById('ef-gendir-'+p.id).value||null
        });
        toast('Guardado'); await loadAll(); renderAll();
      }catch(e){ toast('Error: '+e.message); }
    });
    const cv2=document.createElement('button'); cv2.className='cv'; cv2.textContent='Cancelar';
    cv2.addEventListener('click',()=>editBox.classList.add('off'));
    const dv=document.createElement('button'); dv.className='cv'; dv.style.color='var(--rojo)'; dv.textContent='Borrar';
    dv.addEventListener('click', async()=>{
      if(!confirm('¿Borrar "'+p.titulo+'" y todos sus votos?')) return;
      try{
        await dbDel('votos',`pelicula_id=eq.${p.id}`);
        await dbDel('comentarios',`pelicula_id=eq.${p.id}`).catch(()=>{});
        await dbDel('tertulia_votos',`pelicula_id=eq.${p.id}`).catch(()=>{});
        await dbDel('cartel_votos',`pelicula_id=eq.${p.id}`).catch(()=>{});
        await dbDel('peliculas',`id=eq.${p.id}`);
        toast('Eliminada'); await loadAll(); renderAll();
      }catch(e){ toast('Error: '+e.message); }
    });
    eRow.appendChild(sv); eRow.appendChild(cv2); eRow.appendChild(dv);
    editBox.appendChild(eRow);
    row.addEventListener('click',()=>editBox.classList.toggle('off'));
    wrap.appendChild(row); wrap.appendChild(editBox); el.appendChild(wrap);
  });
}

// ============ DETALLE OVERLAY CLOSE ============
document.getElementById('m-detalle').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideModal('m-detalle'); });


// ============ FESTIVAL FIN DE CURSO ============

function rankingRevelado(){
  return (D.rc||[]).find(x=>x.key==='revealed')?.value==='true' || ADMINS.includes(ME.nombre);
}

function renderFestival(){
  const el=document.getElementById('festival');
  el.innerHTML='';

  const revealed=(D.fc||[]).find(x=>x.key==='revealed')?.value==='true';
  const isAdmin=ADMINS.includes(ME.nombre);
  const myProps=(D.fp||[]).filter(p=>p.miembro_id===ME.id);
  const allVotos=D.fv||[];
  const myVotos=allVotos.filter(v=>v.miembro_id===ME.id);

  // Header
  const hdr=document.createElement('div');
  hdr.innerHTML=`<div style="font-family:var(--fd);font-size:24px;font-weight:700;margin-bottom:6px">Evento fin de curso</div>
    <div style="font-family:var(--fm);font-size:11px;color:var(--gris);margin-bottom:24px">Propón hasta 3 películas y vota tus 5 favoritas (5-4-3-2-1 puntos)</div>`;
  el.appendChild(hdr);

  // Admin reveal button
  if(isAdmin){
    const revBtn=document.createElement('button');
    revBtn.className='btn-rojo';
    revBtn.textContent=revealed?'🔒 Ocultar resultados':'🎬 Revelar resultados al grupo';
    revBtn.style.marginBottom='24px';
    revBtn.addEventListener('click', async()=>{
      try{
        await fetch(`${SB}/rest/v1/festival_config?key=eq.revealed`,{
          method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}
        });
        await dbPost('festival_config',{key:'revealed',value:revealed?'false':'true'});
        toast(revealed?'Resultados ocultados':'¡Resultados revelados!');
        await loadAll(); renderFestival();
      }catch(e){ toast('Error: '+e.message); }
    });
    el.appendChild(revBtn);
  }

  // My proposals section
  const phdr=document.createElement('div'); phdr.className='sec-label';
  phdr.textContent='Mis propuestas ('+myProps.length+'/3)'; el.appendChild(phdr);

  myProps.forEach(prop=>{
    const card=makePropCard(prop, true);
    el.appendChild(card);
  });

  if(myProps.length<3){
    const addBtn=document.createElement('button');
    addBtn.className='btn-borde';
    addBtn.textContent='+ Añadir propuesta';
    addBtn.addEventListener('click',()=>openFestivalAdd());
    el.appendChild(addBtn);
  }

  // All proposals for voting - randomized order (stable per session)
  let allProps=D.fp||[];
  if(allProps.length){
    if(!window._festivalShuffleSeed) window._festivalShuffleSeed=Math.random();
    const seed=window._festivalShuffleSeed;
    allProps=[...allProps].map((p,i)=>({p,r:((i*9301+49297)*seed)%233280}))
      .sort((a,b)=>a.r-b.r).map(x=>x.p);
  }
  if(allProps.length){
    const sep=document.createElement('hr'); sep.className='divider'; el.appendChild(sep);
    const vh=document.createElement('div'); vh.className='sec-label';
    vh.textContent='Todas las propuestas · vota tus 5 favoritas'; el.appendChild(vh);

    const info=document.createElement('div');
    info.style.cssText='font-family:var(--fm);font-size:11px;color:var(--gris);margin-bottom:16px';
    info.textContent='Asigna 5, 4, 3, 2 y 1 punto. Pulsa de nuevo para quitar.';
    el.appendChild(info);

    // Check which positions taken
    const posOcupadas={};
    myVotos.forEach(v=>posOcupadas[v.posicion]=v);

    allProps.forEach(prop=>{
      const myV=myVotos.find(v=>v.prop_id===prop.id);
      const myPos=myV?myV.posicion:0;
      const autor=D.miembros.find(m=>m.id===prop.miembro_id);

      const wrap=document.createElement('div');
      wrap.style.cssText='border:1px solid var(--borde);border-radius:3px;padding:14px;margin-bottom:10px';

      // Card content
      const info2=document.createElement('div');
      info2.style.cssText='display:grid;grid-template-columns:70px 1fr;gap:14px;margin-bottom:12px';
      info2.innerHTML=`
        <div style="width:70px;height:104px;background:var(--gris2);border-radius:2px;overflow:hidden;flex-shrink:0">
          ${prop.poster_url?`<img src="${esc(prop.poster_url)}" style="width:100%;height:100%;object-fit:cover">`:''}
        </div>
        <div>
          <div style="font-family:var(--fd);font-size:15px;font-weight:700;margin-bottom:4px">${esc(prop.titulo)}</div>
          <div style="font-family:var(--fm);font-size:10px;color:var(--gris);margin-bottom:4px">${prop.director?esc(prop.director)+' · ':''}${prop.anio||''}${prop.duracion?' · '+fmtDur(prop.duracion):''}</div>
          <div style="font-family:var(--fm);font-size:10px;color:var(--rojo);margin-bottom:6px">propuesta por ${esc(autor?.nombre||'?')}</div>
          ${prop.comentario?`<div style="font-family:var(--fb);font-size:12px;color:var(--crema2);font-style:italic">"${esc(prop.comentario)}"</div>`:''}
        </div>`;
      wrap.appendChild(info2);

      // Vote buttons - only if not own proposal
      if(prop.miembro_id!==ME.id){
        const btns=document.createElement('div');
        btns.style.cssText='display:flex;gap:6px;flex-wrap:wrap';
        [1,2,3,4,5].forEach(n=>{
          const pts=6-n; // pos 1=5pts, pos2=4pts...
          const isMe=myPos===n;
          const posOcupada=posOcupadas[n]&&!isMe;
          const btn=document.createElement('button');
          btn.textContent=pts+'pts';
          btn.className='pts-btn'+(isMe?' active':'')+(posOcupada?' disabled':'');
          btn.disabled=posOcupada&&!isMe;
          btn.addEventListener('click', async()=>{
            if(posOcupada&&!isMe) return;
            try{
              if(isMe){
                await dbDel('festival_votos',`id=eq.${myV.id}`);
              } else {
                if(myV) await dbDel('festival_votos',`id=eq.${myV.id}`);
                await dbPost('festival_votos',{prop_id:prop.id,miembro_id:ME.id,posicion:n});
              }
              await loadAll(); renderFestival();
            }catch(e){ toast('Error: '+e.message); }
          });
          btns.appendChild(btn);
        });
        wrap.appendChild(btns);
      } else {
        const own=document.createElement('div');
        own.style.cssText='font-family:var(--fm);font-size:10px;color:var(--gris);font-style:italic';
        own.textContent='Tu propuesta · no puedes votarla';
        wrap.appendChild(own);
      }
      el.appendChild(wrap);
    });
  }

  // Results - only if festival revealed or admin
  const festRevealed2=(D.fc||[]).find(x=>x.key==='revealed')?.value==='true';
  if(allProps.length && !festRevealed2 && !isAdmin){
    const sep2=document.createElement('hr'); sep2.className='divider'; el.appendChild(sep2);
    const lock=document.createElement('div'); lock.className='empty';
    lock.innerHTML='<div style="font-family:var(--fd);font-size:24px;color:var(--rojo);margin-bottom:8px">🎬</div>El ranking se revelará el día del evento';
    el.appendChild(lock);
  } else if((festRevealed2||isAdmin) && allProps.length){
    const sep2=document.createElement('hr'); sep2.className='divider'; el.appendChild(sep2);
    const rh=document.createElement('div'); rh.className='sec-label';
    rh.textContent=(isAdmin&&!festRevealed2?'[Solo admin] ':'')+'Ranking final'; el.appendChild(rh);

    const pts={};
    allVotos.forEach(v=>{
      if(!pts[v.prop_id]) pts[v.prop_id]=0;
      pts[v.prop_id]+=(6-v.posicion);
    });
    const ranking=allProps.map(p=>({...p,pts:pts[p.id]||0})).sort((a,b)=>b.pts-a.pts);

    ranking.forEach((prop,i)=>{
      const autor=D.miembros.find(m=>m.id===prop.miembro_id);
      const item=document.createElement('div');
      item.style.cssText='display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--borde)';
      item.innerHTML=`
        <div style="font-family:var(--fm);font-size:14px;color:${i<3?'var(--rojo)':'var(--gris)'};width:24px;text-align:right;flex-shrink:0;font-weight:700">${i+1}</div>
        ${prop.poster_url?`<img src="${esc(prop.poster_url)}" style="width:36px;height:54px;object-fit:cover;border-radius:2px;flex-shrink:0">`:'<div style="width:36px;height:54px;background:var(--gris2);border-radius:2px;flex-shrink:0"></div>'}
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--fd);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(prop.titulo)}</div>
          <div style="font-family:var(--fm);font-size:10px;color:var(--gris)">${esc(autor?.nombre||'?')}</div>
        </div>
        <div style="font-family:var(--fd);font-size:20px;font-weight:700;flex-shrink:0">${prop.pts}pts</div>`;
      el.appendChild(item);
    });
  }
}

function makePropCard(prop, withDelete=false){
  const wrap=document.createElement('div');
  wrap.style.cssText='border:1px solid var(--borde);border-radius:3px;padding:14px;margin-bottom:10px;display:grid;grid-template-columns:60px 1fr;gap:12px;align-items:start';
  wrap.innerHTML=`
    <div style="width:60px;height:90px;background:var(--gris2);border-radius:2px;overflow:hidden">
      ${prop.poster_url?`<img src="${esc(prop.poster_url)}" style="width:100%;height:100%;object-fit:cover">`:''}
    </div>
    <div>
      <div style="font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:3px">${esc(prop.titulo)}</div>
      <div style="font-family:var(--fm);font-size:10px;color:var(--gris);margin-bottom:6px">${prop.director?esc(prop.director)+' · ':''}${prop.anio||''}${prop.duracion?' · '+fmtDur(prop.duracion):''}</div>
      ${prop.comentario?`<div style="font-family:var(--fb);font-size:12px;color:var(--crema2);font-style:italic;margin-bottom:8px">"${esc(prop.comentario)}"</div>`:''}
      ${withDelete?`<button class="btn-sm" style="color:var(--rojo)" data-del-prop="${prop.id}">Eliminar</button>`:''}
    </div>`;
  if(withDelete){
    wrap.querySelector('[data-del-prop]').addEventListener('click', async()=>{
      if(!confirm('¿Eliminar esta propuesta?')) return;
      try{
        await dbDel('festival_props',`id=eq.${prop.id}`);
        toast('Propuesta eliminada'); await loadAll(); renderFestival();
      }catch(e){ toast('Error: '+e.message); }
    });
  }
  return wrap;
}

// Festival add proposal modal
let festivalSearchTO=null, festivalSel=null;

function openFestivalAdd(){
  festivalSel=null;
  document.getElementById('fest-search').value='';
  document.getElementById('fest-results').innerHTML='';
  document.getElementById('fest-comment').value='';
  const btn=document.getElementById('fest-ok');
  btn.classList.add('off');
  btn.disabled=false;
  btn.textContent='Proponer esta película';
  showModal('m-festival');
}

document.getElementById('fest-cancel').addEventListener('click',()=>hideModal('m-festival'));
document.getElementById('m-festival').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideModal('m-festival'); });

document.getElementById('fest-search').addEventListener('input',function(){
  clearTimeout(festivalSearchTO);
  const q=this.value; if(q.length<2){ document.getElementById('fest-results').innerHTML=''; return; }
  festivalSearchTO=setTimeout(async()=>{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TK}&query=${encodeURIComponent(q)}&language=es-ES`);
    const d=await r.json(); const el=document.getElementById('fest-results'); el.innerHTML='';
    if(!d.results?.length){ el.innerHTML='<div style="font-family:var(--fm);font-size:11px;color:var(--gris);padding:8px">Sin resultados</div>'; return; }
    d.results.slice(0,6).forEach(item=>{
      const div=document.createElement('div'); div.className='s-item';
      div.innerHTML=`<div class="s-poster">${item.poster_path?`<img src="${TI}${item.poster_path}" alt="">`:''}</div><div><div style="font-family:var(--fd);font-size:14px">${esc(item.title)}</div><div style="font-family:var(--fm);font-size:10px;color:var(--gris)">${item.release_date?item.release_date.substring(0,4):'—'}</div></div>`;
      div.addEventListener('click',()=>{
        document.querySelectorAll('#fest-results .s-item').forEach(x=>x.classList.remove('sel'));
        div.classList.add('sel'); festivalSel=item;
        document.getElementById('fest-ok').classList.remove('off');
      });
      el.appendChild(div);
    });
  },350);
});

document.getElementById('fest-ok').addEventListener('click', async()=>{
  if(!festivalSel) return;
  const btn=document.getElementById('fest-ok'); btn.disabled=true; btn.textContent='Guardando...';
  try{
    const r=await fetch(`https://api.themoviedb.org/3/movie/${festivalSel.id}?api_key=${TK}&language=es-ES&append_to_response=credits`);
    const d=await r.json();
    const director=d.credits?.crew?.find(c=>c.job==='Director')?.name||'';
    const anio=d.release_date?parseInt(d.release_date.substring(0,4)):null;
    const posterUrl=d.poster_path?`${TI}${d.poster_path}`:null;
    const comentario=document.getElementById('fest-comment').value.trim();
    await dbPost('festival_props',{miembro_id:ME.id,titulo:d.title,director,anio,duracion:d.runtime||null,poster_url:posterUrl,tmdb_id:d.id,comentario});
    hideModal('m-festival'); toast('Propuesta añadida: '+d.title);
    await loadAll(); renderFestival();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; btn.textContent='Proponer esta película'; }
});

// ============ INIT ============
const saved=localStorage.getItem('ab_user');
if(saved){ try{ ME=JSON.parse(saved); startApp(); }catch(e){ initLogin(); } }
else { initLogin(); }
</script>
