<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>As Bestas · Club de Cine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --negro:#0d0d0d;--rojo:#c8382a;--rojo-h:#a82e22;
  --crema:#f0ead8;--crema2:#d9d0b8;--gris:#888;--gris2:#333;
  --borde:rgba(240,234,216,0.15);
  --fd:'Playfair Display',serif;--fb:'IBM Plex Sans',sans-serif;--fm:'IBM Plex Mono',monospace;
}
body{background:var(--negro);color:var(--crema);font-family:var(--fb);min-height:100vh;font-size:14px}
@media(min-width:768px){body{font-size:16px}.peli-titulo{font-size:26px!important}.main{padding:32px 28px!important}}

/* HEADER */
.header{border-bottom:1px solid var(--borde);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;background:var(--negro);z-index:100}
.logo{font-family:var(--fd);font-size:22px;font-weight:900;cursor:pointer}
.logo span{color:var(--rojo)}
.user-pill{font-family:var(--fm);font-size:11px;color:var(--gris);cursor:pointer;padding:4px 10px;border:1px solid var(--borde);border-radius:2px}

/* NAV */
.nav{display:flex;border-bottom:1px solid var(--borde);padding:0 20px;overflow-x:auto;position:sticky;top:56px;background:var(--negro);z-index:99}
.nav button{background:none;border:none;color:var(--gris);font-family:var(--fb);font-size:13px;padding:14px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s}
.nav button.active{color:var(--crema);border-bottom-color:var(--rojo)}
.nav button:hover:not(.active){color:var(--crema2)}

/* MAIN */
.main{padding:24px 20px;max-width:700px;margin:0 auto}

/* TYPOGRAPHY */
.sec-label{font-family:var(--fm);font-size:10px;color:var(--gris);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.peli-titulo{font-family:var(--fd);font-size:20px;font-weight:700;line-height:1.2;color:var(--crema);margin-bottom:6px}
.meta{font-family:var(--fm);font-size:11px;color:var(--gris);line-height:1.9}
.meta a{color:var(--gris);text-decoration:none;border-bottom:1px solid rgba(136,136,136,.3)}

/* POSTER */
.poster{width:100px;height:148px;background:var(--gris2);border-radius:3px;overflow:hidden;flex-shrink:0}
.poster img{width:100%;height:100%;object-fit:cover;display:block}
.poster-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:10px;color:var(--gris);text-align:center;padding:8px}

/* BUTTONS */
.btn-rojo{background:var(--rojo);color:var(--crema);border:none;font-family:var(--fm);font-size:12px;letter-spacing:.05em;padding:10px 20px;cursor:pointer;border-radius:2px;transition:background .2s;display:inline-block}
.btn-rojo:hover{background:var(--rojo-h)}
.btn-rojo:disabled{opacity:.4;cursor:default}
.btn-borde{background:none;border:1px solid var(--borde);color:var(--crema2);font-family:var(--fm);font-size:12px;padding:9px 16px;border-radius:2px;cursor:pointer;transition:all .15s;width:100%;margin-bottom:8px}
.btn-borde:hover{border-color:rgba(240,234,216,.4);color:var(--crema)}
.btn-cancel{background:none;border:none;color:var(--gris);font-family:var(--fm);font-size:12px;padding:8px;cursor:pointer;width:100%}
.btn-confirm{width:100%;background:var(--rojo);color:var(--crema);border:none;font-family:var(--fm);font-size:13px;letter-spacing:.05em;padding:14px;cursor:pointer;border-radius:2px;transition:background .2s;margin-bottom:10px}
.btn-confirm:hover:not(:disabled){background:var(--rojo-h)}
.btn-confirm:disabled{opacity:.4;cursor:default}

/* HISTORIAL ITEMS */
.h-list{display:flex;flex-direction:column}
.h-item{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--borde);cursor:pointer;transition:opacity .15s}
.h-item:hover{opacity:.75}
.h-num{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--rojo);line-height:1;text-align:right}
.h-title{font-family:var(--fd);font-size:15px;color:var(--crema);margin-bottom:3px}
.h-meta{font-family:var(--fm);font-size:10px;color:var(--gris)}
.h-nota{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--crema);text-align:right;white-space:nowrap}
.h-nota span{font-size:10px;color:var(--gris);font-family:var(--fm);font-weight:400;display:block}

/* RANKING */
.r-item{display:grid;grid-template-columns:28px 54px 1fr auto;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--borde);cursor:pointer}
.r-pos{font-family:var(--fm);font-size:12px;color:var(--gris);text-align:right}
.r-pos.top{color:var(--rojo)}
.r-poster{width:54px;height:80px;background:var(--gris2);border-radius:2px;overflow:hidden}
.r-poster img{width:100%;height:100%;object-fit:cover}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px}
.stat-card{border:1px solid var(--borde);border-radius:3px;padding:16px}
.stat-lbl{font-family:var(--fm);font-size:10px;color:var(--gris);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--crema)}
.bar-item{margin-bottom:12px}
.bar-row{display:flex;justify-content:space-between;margin-bottom:5px;cursor:pointer;user-select:none}
.bar-lbl{font-family:var(--fm);font-size:11px;color:var(--crema2)}
.bar-cnt{font-family:var(--fm);font-size:11px;color:var(--gris)}
.bar-track{height:3px;background:rgba(240,234,216,.1);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:var(--rojo);border-radius:2px}
.drilldown{margin-top:8px;margin-bottom:4px}
.drilldown-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--borde);cursor:pointer}
.drilldown-item:hover{opacity:.7}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(13,13,13,.93);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:20px}
.overlay.off{display:none!important}
.modal{background:#161616;border:1px solid var(--borde);border-radius:4px;padding:28px 24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--crema);margin-bottom:4px}
.modal-sub{font-family:var(--fm);font-size:11px;color:var(--gris);margin-bottom:24px}
.form-lbl{font-family:var(--fm);font-size:10px;color:var(--gris);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:8px}
.txt-in{width:100%;background:#1e1e1e;border:1px solid var(--borde);color:var(--crema);font-family:var(--fb);font-size:14px;padding:12px 14px;border-radius:2px;outline:none;margin-bottom:16px}
.txt-in:focus{border-color:rgba(240,234,216,.35)}
.txt-in::placeholder{color:var(--gris)}
.date-in{width:100%;background:#1e1e1e;border:1px solid var(--borde);color:var(--crema);font-family:var(--fm);font-size:13px;padding:10px 14px;border-radius:2px;outline:none;margin-bottom:16px}

/* NOTA SLIDER */
.nota-big{font-family:var(--fd);font-size:64px;font-weight:900;color:var(--crema);text-align:center;margin:8px 0;line-height:1}
input[type=range]{width:100%;accent-color:var(--rojo);margin-bottom:4px}
.nota-ticks{display:flex;justify-content:space-between;margin-bottom:20px}
.nota-tick{font-family:var(--fm);font-size:9px;color:var(--gris)}

/* TMDB SEARCH */
.s-results{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;margin-bottom:16px}
.s-item{display:grid;grid-template-columns:44px 1fr;gap:12px;padding:10px;border:1px solid var(--borde);border-radius:2px;cursor:pointer;align-items:center}
.s-item:hover,.s-item.sel{border-color:var(--rojo);background:rgba(200,56,42,.08)}
.s-poster{width:44px;height:64px;background:var(--gris2);border-radius:2px;overflow:hidden}
.s-poster img{width:100%;height:100%;object-fit:cover}

/* PIN */
.pin-grid{display:flex;gap:10px;justify-content:center;margin:16px 0 24px}
.pin-d{width:52px;height:60px;background:#1e1e1e;border:1px solid var(--borde);border-radius:3px;text-align:center;font-family:var(--fd);font-size:28px;font-weight:700;color:var(--crema);outline:none}
.pin-d:focus{border-color:var(--rojo)}

/* NOMBRE GRID */
.n-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:20px}
.n-btn{background:none;border:1px solid var(--borde);color:var(--crema2);font-family:var(--fb);font-size:13px;padding:10px 8px;border-radius:2px;cursor:pointer;transition:all .15s;text-align:center}
.n-btn.sel{border-color:var(--rojo);color:var(--crema);background:rgba(200,56,42,.12)}

/* DETALLE */
.back-btn{background:none;border:none;color:var(--gris);font-family:var(--fm);font-size:11px;padding:0 0 20px;cursor:pointer;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:var(--crema)}
.det-media{text-align:center;padding:20px 0;border-top:1px solid var(--borde);border-bottom:1px solid var(--borde);margin-bottom:20px}
.det-media-n{font-family:var(--fd);font-size:64px;font-weight:900;color:var(--crema);line-height:1}
.det-media-l{font-family:var(--fm);font-size:11px;color:var(--gris);margin-top:4px}

/* COMMENTS */
.com-item{padding:12px 0;border-bottom:1px solid var(--borde)}
.com-autor{font-family:var(--fm);font-size:10px;color:var(--rojo);margin-bottom:4px}
.com-txt{font-family:var(--fb);font-size:13px;color:var(--crema2);line-height:1.6}
.com-fecha{font-family:var(--fm);font-size:9px;color:var(--gris);margin-top:4px}
textarea.com-area{width:100%;background:#1e1e1e;border:1px solid var(--borde);color:var(--crema);font-family:var(--fb);font-size:13px;padding:12px 14px;border-radius:2px;outline:none;resize:vertical;min-height:80px;line-height:1.5}
textarea.com-area:focus{border-color:rgba(240,234,216,.35)}
textarea.com-area::placeholder{color:var(--gris)}
.com-submit{background:none;border:1px solid var(--borde);color:var(--crema2);font-family:var(--fm);font-size:11px;padding:8px 16px;border-radius:2px;cursor:pointer;margin-top:8px;transition:all .15s}
.com-submit:hover{border-color:var(--rojo);color:var(--crema)}

/* ADMIN */
.m-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--borde)}
.btn-sm{background:none;border:1px solid var(--borde);color:var(--gris);font-family:var(--fm);font-size:11px;padding:5px 10px;border-radius:2px;cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:var(--rojo);color:var(--rojo)}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;background:#1e1e1e;border:1px solid var(--borde);color:var(--crema);font-family:var(--fb);font-size:13px;padding:9px 12px;border-radius:2px;outline:none}
.add-row button{background:var(--rojo);color:var(--crema);border:none;font-family:var(--fm);font-size:12px;padding:9px 16px;border-radius:2px;cursor:pointer}
.edit-box{background:#1a1a1a;border:1px solid var(--borde);border-radius:3px;padding:16px;margin-top:8px}
.edit-box input,.edit-box select{width:100%;background:#111;border:1px solid var(--borde);color:var(--crema);font-family:var(--fb);font-size:13px;padding:8px 10px;border-radius:2px;outline:none;margin-bottom:8px}
.edit-row{display:flex;gap:8px;margin-top:4px}
.edit-row button{flex:1;font-family:var(--fm);font-size:11px;padding:8px;border-radius:2px;cursor:pointer;border:1px solid var(--borde)}
.edit-row .sv{background:var(--rojo);color:var(--crema);border-color:var(--rojo)}
.edit-row .cv{background:none;color:var(--gris)}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.login-logo{font-family:var(--fd);font-size:48px;font-weight:900;margin-bottom:8px}
.login-logo span{color:var(--rojo)}
.login-sub{font-family:var(--fm);font-size:12px;color:var(--gris);margin-bottom:48px}
.login-step{font-family:var(--fm);font-size:10px;color:var(--gris);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}

/* PUNTOS (carteles/tertulias) */
.pts-btn{font-family:var(--fm);font-size:12px;font-weight:500;padding:6px 11px;border-radius:2px;border:1px solid rgba(240,234,216,.2);background:transparent;color:#d9d0b8;cursor:pointer;transition:all .2s;flex-shrink:0}
.pts-btn.active{border-color:#c8382a;background:rgba(200,56,42,.2);color:#c8382a}
.pts-btn.disabled{opacity:.35;cursor:not-allowed}
.pts-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(240,234,216,.1)}

/* MISC */
.divider{border:none;border-top:1px solid var(--borde);margin:20px 0}
.loader{text-align:center;padding:40px 0;font-family:var(--fm);font-size:12px;color:var(--gris)}
.empty{text-align:center;padding:48px 0;font-family:var(--fm);font-size:12px;color:var(--gris);line-height:2}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--borde);color:var(--crema);font-family:var(--fm);font-size:12px;padding:12px 20px;border-radius:2px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.off{display:none!important}
.badge-estreno{display:inline-block;font-family:var(--fm);font-size:9px;padding:2px 5px;border-radius:2px;background:rgba(200,56,42,.2);color:var(--rojo);border:1px solid rgba(200,56,42,.4);margin-left:6px;vertical-align:middle}
.fab{position:fixed;bottom:24px;right:20px;background:var(--rojo);color:var(--crema);border:none;width:48px;height:48px;border-radius:50%;font-size:24px;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,56,42,.4)}
.fab:hover{background:var(--rojo-h)}
</style>
</head>
<body>

<script>
const SB = 'https://vzklyzbphcfxfuqevnui.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6a2x5emJwaGNmeGZ1cWV2bnVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTY3NjcsImV4cCI6MjA5NjEzMjc2N30.7Ux4I8Wyg8WN-hMRTIM8daAoeyl-na4pkRbtTWDpT3M';
const TK = '12e800990f66a67d30314bf0b48dcb72';
const TI = 'https://image.tmdb.org/t/p/w200';
const ADMINS = ['Mon'];
const TEMPORADA = '2025-26';

let ME = null;
let D = { miembros:[], pelis:[], votos:[], coms:[], tv:[], cv:[] };
let peliVotando = null;
let tmdbSel = null;
let searchTO = null;

// ============ DB ============
async function dbGet(tabla, qs=''){
  const r = await fetch(`${SB}/rest/v1/${tabla}${qs?'?'+qs:''}`, {
    headers:{'apikey':SK,'Authorization':'Bearer '+SK}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPost(tabla, body){
  const r = await fetch(`${SB}/rest/v1/${tabla}`, {
    method:'POST',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPatch(tabla, qs, body){
  const r = await fetch(`${SB}/rest/v1/${tabla}?${qs}`, {
    method:'PATCH',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbDel(tabla, qs){
  const r = await fetch(`${SB}/rest/v1/${tabla}?${qs}`, {
    method:'DELETE',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK}
  });
  if(!r.ok) throw new Error(await r.text());
}

// ============ HELPERS ============
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function votosP(id){ return D.votos.filter(v=>v.pelicula_id===id) }
function mediaP(id){
  const vv=votosP(id); if(!vv.length) return null;
  return (vv.reduce((a,b)=>a+b.nota,0)/vv.length).toFixed(1);
}
function comsP(id){ return D.coms.filter(c=>c.pelicula_id===id) }
function nombreM(id){ return (D.miembros.find(m=>m.id===id)||{}).nombre||'?' }
function miVoto(pid){ return D.votos.find(v=>v.pelicula_id===pid&&v.miembro_id===ME.id) }
function fmtFecha(d){
  if(!d) return '—';
  return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
}
function fmtDur(m){
  if(!m) return null;
  const h=Math.floor(m/60),mm=m%60;
  return h>0?(mm>0?`${h}h ${mm}min`:`${h}h`):`${mm}min`;
}
function paisPrincipal(p){
  if(!p.pais) return null;
  return p.pais.split(',')[0].split('/')[0].trim()||null;
}
function estreno(anio){ return (anio===2025||anio===2026) }
function inferGenero(nombre){
  if(!nombre) return null;
  const n=nombre.trim().split(' ')[0].toLowerCase();
  const F=['sofia','sofía','laura','ana','maría','maria','elena','sara','isabel','carmen','julia','celine','céline','jane','alice','andrea','lucrecia','claudia','mia','mía','lynne','kathryn','agnès','agnes','chloé','chloe','greta','nora','naomi','nicole','lila','marielle','rebecca','debra','patty','niki','věra','vera','dorota','valeria','lina','paola','chiara','francesca','haifaa','waad','nadine','maren','jasmila','carla','penélope','alba','iciar','icíar','pilar','neus'];
  const M=['pedro','alfonso','bong','park','lee','kim','wes','yorgos','todd','jordan','denis','xavier','ruben','ridley','christopher','steven','martin','quentin','david','james','john','paul','george','michael','robert','thomas','richard','charles','daniel','peter','mark','andrew','anthony','edward','kenneth','roger','alan','eric','philip','jonathan','sebastian','oliver','hugo','alejandro','carlos','miguel','rafael','fernando','luis','javier','pablo','juan','antonio','jose','manuel','francisco','sergio','víctor','victor','andrei','akira','hayao','satoshi','wong','hong','asghar','abbas','jafar','majid','hirokazu','nanni','paolo','marco','luca','matteo','federico','bernardo','vittorio','jean','françois','leos','bruno','arnaud','olivier','laurent','mathieu','nicolas','michel','roman','stanley','billy','woody','francis','brian','terry','tim','guillermo','iñárritu'];
  if(F.includes(n)) return 'F';
  if(M.includes(n)) return 'M';
  return null;
}
function generoDir(p){ return p.genero_director || inferGenero(p.director) }

let loginId=null, loginNombre=null;
function loginStep2(id,nombre){
  loginId=id; loginNombre=nombre;
  document.getElementById('login-p1').classList.add('off');
  document.getElementById('login-p2').classList.remove('off');
  document.getElementById('login-p2-label').textContent='PIN de '+nombre;
  ['p0','p1','p2','p3'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('pin-ok').classList.add('off');
  document.getElementById('p0').focus();
}
document.getElementById('pin-back').addEventListener('click',()=>{
  document.getElementById('login-p2').classList.add('off');
  document.getElementById('login-p1').classList.remove('off');
});
['p0','p1','p2','p3'].forEach((id,i)=>{
  document.getElementById(id).addEventListener('input',()=>{
    const v=document.getElementById(id).value;
    if(v&&i<3) document.getElementById('p'+(i+1)).focus();
    const pin=['p0','p1','p2','p3'].map(x=>document.getElementById(x).value).join('');
    document.getElementById('pin-ok').classList.toggle('off',pin.length<4);
  });
});
document.getElementById('pin-ok').addEventListener('click', async()=>{
  const pin=['p0','p1','p2','p3'].map(x=>document.getElementById(x).value).join('');
  const btn=document.getElementById('pin-ok');
  btn.disabled=true; btn.textContent='Verificando...';
  try{
    const rows=await dbGet('miembros',`id=eq.${loginId}&select=id,nombre,pin`);
    const m=rows[0];
    if(!m.pin){
      await dbPatch('miembros',`id=eq.${loginId}`,{pin});
      toast('PIN creado. ¡Bienvenido/a!');
    } else if(m.pin!==pin){
      toast('PIN incorrecto');
      btn.disabled=false; btn.textContent='Entrar';
      ['p0','p1','p2','p3'].forEach(x=>document.getElementById(x).value='');
      document.getElementById('p0').focus();
      return;
    }
    ME={id:loginId,nombre:loginNombre};
    localStorage.setItem('ab_user',JSON.stringify(ME));
    startApp();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; btn.textContent='Entrar'; }
});

function renderRanking(){
  const el=document.getElementById('ranking');
  el.innerHTML='';

  const withMedia=D.pelis.map(p=>({...p,media:mediaP(p.id),nV:votosP(p.id).length}))
    .filter(p=>p.media!==null&&p.nV>=4)
    .sort((a,b)=>parseFloat(b.media)-parseFloat(a.media));

  const estrenos=withMedia.filter(p=>estreno(p.anio));

  function makeRankList(title,list){
    if(!list.length) return;
    const h=document.createElement('div'); h.className='sec-label'; h.textContent=title; el.appendChild(h);
    list.forEach((p,i)=>{
      const d=document.createElement('div'); d.className='r-item';
      d.innerHTML=`
        <div class="r-pos ${i<3?'top':''}">${i+1}</div>

}

// ============ RENDER ESTADÍSTICAS ============
function renderEstadisticas(){
  const el=document.getElementById('estadisticas');
  el.innerHTML='';
  if(!D.pelis.length){ el.innerHTML='<div class="empty">Sin datos aún.</div>'; return; }

  const totalVotos=D.votos.length;
  const medias=D.pelis.map(p=>parseFloat(mediaP(p.id))).filter(m=>!isNaN(m));
  const mediaTemp=medias.length?(medias.reduce((a,b)=>a+b,0)/medias.length).toFixed(1):'—';
  const mejorNota=medias.length?Math.max(...medias).toFixed(1):'—';

  // Stats cards
  const grid=document.createElement('div'); grid.className='stats-grid';
  [[D.pelis.length,'Películas vistas'],[mediaTemp,'Media temporada'],[mejorNota,'Mejor nota'],[totalVotos,'Votos totales']].forEach(([v,l])=>{
    grid.innerHTML+=`<div class="stat-card"><div class="stat-lbl">${l}</div><div class="stat-val">${v}</div></div>`;
  });
  el.appendChild(grid);

  // Género director
  let nF=0,nM=0,nN=0;
  D.pelis.forEach(p=>{ const g=generoDir(p); if(g==='F')nF++; else if(g==='M')nM++; else nN++; });
  const gDiv=document.createElement('div'); gDiv.style.marginBottom='24px';
  gDiv.innerHTML=`<div class="sec-label">Género del director/a (estimado)</div>`;
  const total=nF+nM+nN||1;
  if(nF||nM){
    gDiv.innerHTML+=`
      <div class="bar-item"><div class="bar-row"><span class="bar-lbl" style="color:#d4826a">Directoras</span><span class="bar-cnt">${nF}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(nF/total*100)}%;background:#d4826a"></div></div></div>
      <div class="bar-item"><div class="bar-row"><span class="bar-lbl">Directores</span><span class="bar-cnt">${nM}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(nM/total*100)}%"></div></div></div>
      ${nN?`<div style="font-family:var(--fm);font-size:10px;color:var(--gris);margin-top:4px">${nN} sin dato · corregible desde Admin</div>`:''}`;
  }
  el.appendChild(gDiv);

  // Helper: build bar section with drilldown
  function barSection(title,entries,maxV,pelsByKey){
    if(!entries.length) return;
    const sec=document.createElement('div'); sec.style.marginBottom='24px';
    const lbl=document.createElement('div'); lbl.className='sec-label'; lbl.textContent=title; sec.appendChild(lbl);
    entries.forEach(([key,n])=>{
      const uid='dd_'+Math.random().toString(36).slice(2);
      const item=document.createElement('div'); item.className='bar-item';
      const row=document.createElement('div'); row.className='bar-row';
      row.innerHTML=`<span class="bar-lbl">${esc(key)} <span style="font-size:9px">▾</span></span><span class="bar-cnt">${n}</span>`;
      const track=document.createElement('div'); track.className='bar-track';
      track.innerHTML=`<div class="bar-fill" style="width:${Math.round(n/maxV*100)}%"></div>`;
      const dd=document.createElement('div'); dd.className='drilldown off'; dd.id=uid;
      (pelsByKey[key]||[]).forEach(p=>{
        const di=document.createElement('div'); di.className='drilldown-item';
        di.innerHTML=`${p.poster_url?`<img src="${esc(p.poster_url)}" style="width:28px;height:42px;object-fit:cover;border-radius:2px;flex-shrink:0">`:'<div style="width:28px;height:42px;background:var(--gris2);border-radius:2px;flex-shrink:0"></div>'}
          <div style="flex:1;min-width:0"><div style="font-family:var(--fd);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.titulo)}</div><div style="font-family:var(--fm);font-size:10px;color:var(--gris)">${p.anio||''}${p.director?' · '+esc(p.director):''}</div></div>
          <div style="font-family:var(--fd);font-size:16px;font-weight:700;flex-shrink:0">${mediaP(p.id)||'—'}</div>`;
        di.addEventListener('click',()=>openDetalle(p.id));
        dd.appendChild(di);
      });
      row.addEventListener('click',()=>dd.classList.toggle('off'));
      item.appendChild(row); item.appendChild(track); item.appendChild(dd);
      sec.appendChild(item);
    });
    el.appendChild(sec);
  }

  // Países - usa paisPrincipal
  const paMap={}, paByKey={};
  D.pelis.forEach(p=>{
    const t=paisPrincipal(p); if(!t) return;
    paMap[t]=(paMap[t]||0)+1;
    if(!paByKey[t]) paByKey[t]=[];
    paByKey[t].push(p);
  });
  const paOrd=Object.entries(paMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  barSection('Por país',paOrd,paOrd[0]?.[1]||1,paByKey);

  // Décadas
  const deMap={}, deByKey={};
  D.pelis.forEach(p=>{ if(!p.anio) return; const d=Math.floor(p.anio/10)*10+'s'; deMap[d]=(deMap[d]||0)+1; if(!deByKey[d])deByKey[d]=[]; deByKey[d].push(p); });
  const deOrd=Object.entries(deMap).sort((a,b)=>parseInt(b[0])-parseInt(a[0]));
  barSection('Por década',deOrd,deOrd[0]?.[1]||1,deByKey);

  // Géneros
  const geMap={}, geByKey={};
  D.pelis.forEach(p=>{ if(!p.genero) return; p.genero.split(',').forEach(g=>{ const t=g.trim(); if(!t) return; geMap[t]=(geMap[t]||0)+1; if(!geByKey[t])geByKey[t]=[]; geByKey[t].push(p); }); });
  const geOrd=Object.entries(geMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  barSection('Por género',geOrd,geOrd[0]?.[1]||1,geByKey);

  // Duración
  const durMap={'–90 min':[],'90–120 min':[],'120–150 min':[],'+150 min':[]};
  D.pelis.forEach(p=>{ if(!p.duracion) return; if(p.duracion<90)durMap['–90 min'].push(p); else if(p.duracion<120)durMap['90–120 min'].push(p); else if(p.duracion<150)durMap['120–150 min'].push(p); else durMap['+150 min'].push(p); });
  const durOrd=Object.entries(durMap).filter(([,v])=>v.length).map(([k,v])=>[k,v.length]);
  const durByKey={}; Object.entries(durMap).forEach(([k,v])=>durByKey[k]=v);
  barSection('Por duración',durOrd,Math.max(...durOrd.map(x=>x[1]),1),durByKey);

  // FA comparison
  const comp=D.pelis.filter(p=>p.fa_nota&&mediaP(p.id)).map(p=>({...p,diff:parseFloat((parseFloat(mediaP(p.id))-p.fa_nota).toFixed(1))})).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  if(comp.length){
    const faDiv=document.createElement('div'); faDiv.style.marginBottom='24px';
    faDiv.innerHTML=`<div class="sec-label">Diferencia con FilmAffinity</div>`;
    const masAlta=comp.filter(p=>p.diff>0).sort((a,b)=>b.diff-a.diff).slice(0,3);
    const masBaja=comp.filter(p=>p.diff<0).sort((a,b)=>a.diff-b.diff).slice(0,3);
    if(masAlta.length){
      faDiv.innerHTML+=`<div style="font-family:var(--fm);font-size:10px;color:var(--gris);margin-bottom:8px">Más valoradas por el grupo que FA</div>`;
      masAlta.forEach(p=>{ const d=document.createElement('div'); d.style.cssText='display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--borde);cursor:pointer'; d.innerHTML=`<span style="font-family:var(--fd);font-size:13px">${esc(p.titulo)}</span><span style="font-family:var(--fm);font-size:11px;color:var(--rojo)">+${p.diff}</span>`; d.addEventListener('click',()=>openDetalle(p.id)); faDiv.appendChild(d); });
    }
    if(masBaja.length){
      faDiv.innerHTML+=`<div style="font-family:var(--fm);font-size:10px;color:var(--gris);margin:12px 0 8px">Menos valoradas que FA</div>`;
      masBaja.forEach(p=>{ const d=document.createElement('div'); d.style.cssText='display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--borde);cursor:pointer'; d.innerHTML=`<span style="font-family:var(--fd);font-size:13px">${esc(p.titulo)}</span><span style="font-family:var(--fm);font-size:11px;color:var(--gris)">${p.diff}</span>`; d.addEventListener('click',()=>openDetalle(p.id)); faDiv.appendChild(d); });
    }
    el.appendChild(faDiv);
  }
}

// ============ RENDER TERTULIAS / CARTELES ============
function renderVotacionPage(secId, tabla, store){
  const el=document.getElementById(secId);
  el.innerHTML='';

  const myVotes=D[store].filter(v=>v.miembro_id===ME.id);
  const allVotes=D[store];

  // Header
  const hdr=document.createElement('div'); hdr.className='sec-label';
  hdr.textContent='Mis '+(secId==='tertulias'?'tertulias':'carteles')+' favoritos · temporada '+TEMPORADA;
  el.appendChild(hdr);

  const info=document.createElement('div');
  info.style.cssText='font-family:var(--fm);font-size:11px;color:var(--gris);margin-bottom:20px';
  info.textContent='Asigna 3, 2 y 1 punto a tres '+(secId==='tertulias'?'tertulias':'carteles')+'. Pulsa de nuevo para quitar.';
  el.appendChild(info);

  // For each peli, show pts buttons
  const pos1=myVotes.find(v=>v.posicion===1);
  const pos2=myVotes.find(v=>v.posicion===2);
  const pos3=myVotes.find(v=>v.posicion===3);

  D.pelis.forEach(p=>{
    const myV=myVotes.find(v=>v.pelicula_id===p.id);
    const myPos=myV?myV.posicion:0;

    const row=document.createElement('div');
    row.className='pts-row';

    // Info
    const info2=document.createElement('div');
    info2.style.cssText='display:flex;align-items:center;gap:10px;flex:1;min-width:0';
    if(p.poster_url){
      const img=document.createElement('img');
      img.src=p.poster_url; img.style.cssText='width:32px;height:48px;object-fit:cover;border-radius:2px;flex-shrink:0';
      info2.appendChild(img);
    }
    const txt=document.createElement('div');
    txt.style.cssText='min-width:0;flex:1';
    txt.innerHTML=`<div style="font-family:var(--fd);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.titulo)}</div><div style="font-family:var(--fm);font-size:10px;color:var(--gris)">${p.anio||''}${p.fecha_sesion?' · '+fmtFecha(p.fecha_sesion):''}</div>`;
    info2.appendChild(txt);
    row.appendChild(info2);

    // Buttons 3pts 2pts 1pt
    const btns=document.createElement('div');
    btns.style.cssText='display:flex;gap:4px;flex-shrink:0';

    [1,2,3].forEach(n=>{
      const pts=n===1?3:n===2?2:1;
      const isMe=myPos===n;
      const posOcupada=n===1?pos1:n===2?pos2:pos3;
      const libre=!posOcupada||isMe;

      const btn=document.createElement('button');
      btn.textContent=pts+'pts';
      btn.className='pts-btn'+(isMe?' active':'')+((!libre)?' disabled':'');
      btn.disabled=!libre&&!isMe;

      btn.addEventListener('click', async()=>{
        if(!libre&&!isMe) return;
        try{
          if(isMe){
            await dbDel(tabla,`id=eq.${myV.id}`);
          } else {
            if(myV) await dbDel(tabla,`id=eq.${myV.id}`);
            await dbPost(tabla,{pelicula_id:p.id,miembro_id:ME.id,posicion:n});
          }
          await loadAll();
          renderVotacionPage(secId,tabla,store);
          renderRanking();
        }catch(e){ toast('Error: '+e.message); }
      });
      btns.appendChild(btn);
    });
    row.appendChild(btns);
    el.appendChild(row);
  });

  // Ranking
  if(allVotes.length){
    const pts={};
    allVotes.forEach(v=>{
      if(!pts[v.pelicula_id]) pts[v.pelicula_id]={p:0,v1:0,v2:0,v3:0};
      pts[v.pelicula_id].p+=v.posicion===1?3:v.posicion===2?2:1;
      pts[v.pelicula_id]['v'+v.posicion]++;
    });
    const ranking=D.pelis.filter(p=>pts[p.id]).map(p=>({...p,...pts[p.id]})).sort((a,b)=>b.p-a.p);

    const sep=document.createElement('hr'); sep.className='divider'; el.appendChild(sep);
    const rh=document.createElement('div'); rh.className='sec-label'; rh.textContent='Ranking · '+allVotes.length+' votos'; el.appendChild(rh);

    ranking.forEach((p,i)=>{
      const item=document.createElement('div');
      item.style.cssText='display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--borde);cursor:pointer';
      item.innerHTML=`
        <div style="font-family:var(--fm);font-size:12px;color:${i<3?'var(--rojo)':'var(--gris)'};width:20px;text-align:right;flex-shrink:0">${i+1}</div>
        ${p.poster_url?`<img src="${esc(p.poster_url)}" style="width:36px;height:54px;object-fit:cover;border-radius:2px;flex-shrink:0">`:'<div style="width:36px;height:54px;background:var(--gris2);border-radius:2px;flex-shrink:0"></div>'}
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--fd);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.titulo)}</div>
          <div style="font-family:var(--fm);font-size:10px;color:var(--gris);margin-top:2px">${p.v1?`<span style="color:var(--rojo)">${p.v1}×3pts</span> `:''}${p.v2?p.v2+'×2pts ':''} ${p.v3?p.v3+'×1pt':''}</div>
        </div>
        <div style="font-family:var(--fd);font-size:20px;font-weight:700;flex-shrink:0">${p.p}pts</div>`;
      item.addEventListener('click',()=>openDetalle(p.id));
      el.appendChild(item);
    });
  }
}

function renderTertulias(){ renderVotacionPage('tertulias','tertulia_votos','tv') }
function renderCarteles(){ renderVotacionPage('carteles','cartel_votos','cv') }

// ============ DETALLE ============
function openDetalle(pelId){
  const p=D.pelis.find(x=>x.id===pelId); if(!p) return;
  const vv=votosP(pelId), media=mediaP(pelId), coms=comsP(pelId), yaVote=miVoto(pelId), dur=fmtDur(p.duracion);
  const faLink=p.filmaffinity_url?`<a href="${esc(p.filmaffinity_url)}" target="_blank" style="color:var(--gris);font-family:var(--fm);font-size:11px;border-bottom:1px solid rgba(136,136,136,.3)">FilmAffinity ↗</a>`:'';
  const body=document.getElementById('m-detalle-body');
  body.innerHTML='';

  const back=document.createElement('button'); back.className='back-btn'; back.textContent='← Volver';
  back.addEventListener('click',()=>hideModal('m-detalle'));
  body.appendChild(back);

  body.innerHTML+=`
    <div style="display:grid;grid-template-columns:100px 1fr;gap:20px;margin-bottom:20px">
      <div class="poster">${p.poster_url?`<img src="${esc(p.poster_url)}" alt="">`:`<div class="poster-ph">${esc(p.titulo)}</div>`}</div>
      <div>
        <div style="font-family:var(--fm);font-size:10px;color:var(--rojo);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">${p.fecha_sesion?fmtFecha(p.fecha_sesion):''}</div>
        <div class="peli-titulo">${esc(p.titulo)}${estreno(p.anio)?'<span class="badge-estreno">estreno</span>':''}</div>
        <div class="meta">${p.director?esc(p.director)+'<br>':''}${p.anio||''}${p.pais?' · '+esc(p.pais):''}${dur?' · '+dur:''}<br>${p.genero?esc(p.genero)+'<br>':''}</div>
        ${faLink}
      </div>
    </div>`;

  if(media){
    body.innerHTML+=`<div class="det-media"><div class="det-media-n">${media}</div><div class="det-media-l">${vv.length} votos · media del grupo</div></div>`;
  }

  // Votar btn or ya votaste
  if(yaVote){
    body.innerHTML+=`<div style="font-family:var(--fm);font-size:11px;color:var(--gris);text-align:center;padding:12px 0;font-style:italic">Tu nota: <strong style="color:var(--crema)">${yaVote.nota}/10</strong></div>`;
  } else {
    const vBtn=document.createElement('button'); vBtn.className='btn-rojo'; vBtn.textContent='Votar esta película'; vBtn.style.width='100%'; vBtn.style.textAlign='center'; vBtn.style.marginBottom='8px';
    vBtn.addEventListener('click',()=>{ hideModal('m-detalle'); openVotar(pelId); });
    body.appendChild(vBtn);
  }

  // Comments
  body.innerHTML+=`<hr class="divider"><div class="sec-label">Comentarios (${coms.length})</div>`;
  if(coms.length){
    coms.forEach(c=>{
      body.innerHTML+=`<div class="com-item"><div class="com-autor">${esc(nombreM(c.miembro_id))}</div><div class="com-txt">${esc(c.texto)}</div><div class="com-fecha">${new Date(c.creado_en).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})}</div></div>`;
    });
  } else {
    body.innerHTML+=`<div style="font-family:var(--fm);font-size:11px;color:var(--gris);padding:12px 0">Sin comentarios aún.</div>`;
  }
  const ta=document.createElement('textarea'); ta.className='com-area'; ta.placeholder='Escribe tu comentario...'; ta.style.marginTop='16px';
  const cBtn=document.createElement('button'); cBtn.className='com-submit'; cBtn.textContent='Publicar';
  cBtn.addEventListener('click', async()=>{
    const txt=ta.value.trim(); if(!txt) return;
    try{
      await dbPost('comentarios',{pelicula_id:pelId,miembro_id:ME.id,texto:txt});
      ta.value=''; toast('Comentario publicado');
      await loadAll(); hideModal('m-detalle'); openDetalle(pelId);
    }catch(e){ toast('Error publicando'); }
  });
  body.appendChild(ta); body.appendChild(cBtn);
  showModal('m-detalle');
}

// ============ VOTAR ============
function openVotar(pelId){
  const p=D.pelis.find(x=>x.id===pelId); if(!p) return;
  peliVotando=p;
  document.getElementById('mv-title').textContent=p.titulo;
  document.getElementById('mv-sub').textContent=(p.director||'')+(p.anio?' · '+p.anio:'')+(p.fecha_sesion?' · '+fmtFecha(p.fecha_sesion):'');
  document.getElementById('mv-slider').value=7;
  document.getElementById('mv-nota').textContent='7';
  showModal('m-votar');
}
document.getElementById('mv-slider').addEventListener('input',function(){ document.getElementById('mv-nota').textContent=this.value; });
document.getElementById('mv-ok').addEventListener('click', async()=>{
  if(!peliVotando) return;
  const nota=parseInt(document.getElementById('mv-slider').value);
  const btn=document.getElementById('mv-ok'); btn.disabled=true; btn.textContent='Guardando...';
  try{
    await dbPost('votos',{pelicula_id:peliVotando.id,miembro_id:ME.id,nota});
    hideModal('m-votar'); toast('Voto: '+nota+'/10');
    await loadAll(); renderAll();
  }catch(e){ toast('Ya has votado esta película'); btn.disabled=false; btn.textContent='Confirmar voto'; }
});
document.getElementById('mv-cancel').addEventListener('click',()=>hideModal('m-votar'));
document.getElementById('m-votar').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideModal('m-votar'); });

// ============ AÑADIR PELÍCULA ============
let tmdbSel=null, searchTO=null;
function openAddModal(){
  tmdbSel=null;
  document.getElementById('add-search').value='';
  document.getElementById('add-results').innerHTML='';
  document.getElementById('add-ok').classList.add('off');
  document.getElementById('add-fa').value='';
  document.getElementById('add-fecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('add-manual').classList.add('off');
  showModal('m-add');
}
document.getElementById('add-cancel').addEventListener('click',()=>hideModal('m-add'));
document.getElementById('m-add').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideModal('m-add'); });
document.getElementById('add-manual-toggle').addEventListener('click',()=>document.getElementById('add-manual').classList.toggle('off'));
document.getElementById('add-search').addEventListener('input',function(){
  clearTimeout(searchTO);
  const q=this.value; if(q.length<2){ document.getElementById('add-results').innerHTML=''; return; }
  searchTO=setTimeout(async()=>{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TK}&query=${encodeURIComponent(q)}&language=es-ES`);
    const d=await r.json(); const el=document.getElementById('add-results'); el.innerHTML='';
    if(!d.results?.length){ el.innerHTML='<div style="font-family:var(--fm);font-size:11px;color:var(--gris);padding:8px">Sin resultados</div>'; return; }
    d.results.slice(0,6).forEach(item=>{
      const div=document.createElement('div'); div.className='s-item';
      div.innerHTML=`<div class="s-poster">${item.poster_path?`<img src="${TI}${item.poster_path}" alt="">`:''}</div><div><div style="font-family:var(--fd);font-size:14px">${esc(item.title)}</div><div style="font-family:var(--fm);font-size:10px;color:var(--gris)">${item.release_date?item.release_date.substring(0,4):'—'}</div></div>`;
      div.addEventListener('click',()=>{
        document.querySelectorAll('.s-item').forEach(x=>x.classList.remove('sel'));
        div.classList.add('sel'); tmdbSel=item;
        document.getElementById('add-ok').classList.remove('off');
      });
      el.appendChild(div);
    });
  },350);
});
document.getElementById('add-ok').addEventListener('click', async()=>{
  if(!tmdbSel) return;
  const btn=document.getElementById('add-ok'); btn.disabled=true; btn.textContent='Buscando...';
  try{
    const r=await fetch(`https://api.themoviedb.org/3/movie/${tmdbSel.id}?api_key=${TK}&language=es-ES&append_to_response=credits`);
    const d=await r.json();
    const director=d.credits?.crew?.find(c=>c.job==='Director')?.name||'';
    const pais=d.production_countries?.length?d.production_countries[0].name:'';
    const generos=d.genres?.map(g=>g.name).join(', ')||'';
    const anio=d.release_date?parseInt(d.release_date.substring(0,4)):null;
    const posterUrl=d.poster_path?`${TI}${d.poster_path}`:null;
    const faManual=document.getElementById('add-fa').value.trim();
    const faUrl=faManual||`https://www.filmaffinity.com/es/search.php?stype=title&stext=${encodeURIComponent(d.title)}`;
    await dbPost('peliculas',{titulo:d.title,director,anio,pais,genero:generos,sinopsis:d.overview||'',poster_url:posterUrl,tmdb_id:d.id,filmaffinity_url:faUrl,fecha_sesion:document.getElementById('add-fecha').value||null,numero_sesion:D.pelis.length+1,temporada:TEMPORADA,duracion:d.runtime||null});
    hideModal('m-add'); toast('Añadida: '+d.title);
    await loadAll(); renderAll();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; btn.textContent='Añadir al club'; }
});
document.getElementById('m-ok').addEventListener('click', async()=>{
  const titulo=document.getElementById('m-titulo').value.trim(); if(!titulo){ toast('El título es obligatorio'); return; }
  const btn=document.getElementById('m-ok'); btn.disabled=true; btn.textContent='Guardando...';
  try{
    await dbPost('peliculas',{titulo,director:document.getElementById('m-dir').value.trim()||null,anio:parseInt(document.getElementById('m-anio').value)||null,pais:document.getElementById('m-pais').value.trim()||null,genero:document.getElementById('m-genero').value.trim()||null,duracion:parseInt(document.getElementById('m-dur').value)||null,poster_url:document.getElementById('m-poster').value.trim()||null,filmaffinity_url:document.getElementById('add-fa').value.trim()||null,fecha_sesion:document.getElementById('add-fecha').value||null,numero_sesion:D.pelis.length+1,temporada:TEMPORADA});
    hideModal('m-add'); toast('Añadida: '+titulo);
    await loadAll(); renderAll();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; btn.textContent='Añadir manualmente'; }
});

// ============ ADMIN ============
function renderAdmin(){
  const el=document.getElementById('admin'); el.innerHTML='';

  // Miembros
  const mh=document.createElement('div'); mh.className='sec-label'; mh.textContent='Miembros del grupo'; el.appendChild(mh);
  D.miembros.forEach(m=>{
    const row=document.createElement('div'); row.className='m-item';
    row.innerHTML=`<span style="font-family:var(--fb)">${esc(m.nombre)}</span><div style="display:flex;gap:8px">`;
    const rBtn=document.createElement('button'); rBtn.className='btn-sm'; rBtn.textContent='Reset PIN';
    rBtn.addEventListener('click', async()=>{ if(confirm('¿Resetear PIN de '+m.nombre+'?')){ await dbPatch('miembros',`id=eq.${m.id}`,{pin:null}); toast('PIN reseteado'); }});
    const dBtn=document.createElement('button'); dBtn.className='btn-sm'; dBtn.textContent='Eliminar';
    dBtn.addEventListener('click', async()=>{ if(confirm('¿Eliminar a '+m.nombre+'?')){ await dbDel('miembros',`id=eq.${m.id}`); toast(m.nombre+' eliminado'); await loadAll(); renderAdmin(); }});
    const div=row.querySelector('div'); div.appendChild(rBtn); div.appendChild(dBtn); el.appendChild(row);
  });
  const addRow=document.createElement('div'); addRow.className='add-row'; addRow.style.marginBottom='32px';
  const inp=document.createElement('input'); inp.placeholder='Nombre nuevo miembro';
  const addBtn=document.createElement('button'); addBtn.textContent='Añadir';
  addBtn.addEventListener('click', async()=>{
    const n=inp.value.trim(); if(!n) return;
    try{ await dbPost('miembros',{nombre:n,activo:true}); inp.value=''; toast(n+' añadido'); await loadAll(); renderAdmin(); }catch(e){ toast('Error: ese nombre ya existe'); }
  });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') addBtn.click(); });
  addRow.appendChild(inp); addRow.appendChild(addBtn); el.appendChild(addRow);

  // Películas
  const ph=document.createElement('div'); ph.className='sec-label'; ph.textContent='Películas de la temporada'; el.appendChild(ph);
  const addPBtn=document.createElement('button'); addPBtn.className='btn-rojo'; addPBtn.textContent='+ Añadir película'; addPBtn.style.marginBottom='16px';
  addPBtn.addEventListener('click',openAddModal); el.appendChild(addPBtn);

  [...D.pelis].reverse().forEach((p,i)=>{
    const num=D.pelis.length-i;
    const wrap=document.createElement('div');
    const row=document.createElement('div'); row.className='h-item'; row.style.cursor='pointer';
    row.innerHTML=`<div class="h-num">${num}</div><div><div class="h-title">${esc(p.titulo)}</div><div class="h-meta">${p.fecha_sesion?fmtFecha(p.fecha_sesion):'Sin fecha'}</div></div><div style="font-family:var(--fm);font-size:11px;color:var(--gris)">editar ›</div>`;
    const editBox=document.createElement('div'); editBox.className='edit-box off';

    // Edit fields
    const fields=[
      ['Título','ef-titulo',p.titulo,'text'],['Director/a','ef-dir',p.director||'','text'],
      ['Fecha','ef-fecha',p.fecha_sesion||'','date'],['País principal','ef-pais',p.pais||'','text'],
      ['Nota FilmAffinity','ef-fanota',p.fa_nota||'','number'],['Enlace FilmAffinity','ef-fa',p.filmaffinity_url||'','text']
    ];
    fields.forEach(([lbl,id,val,type])=>{
      const l=document.createElement('label'); l.className='form-lbl'; l.style.marginTop='8px'; l.textContent=lbl; editBox.appendChild(l);
      const inp2=document.createElement('input'); inp2.id=id+'-'+p.id; inp2.value=val; inp2.type=type; if(type==='number') inp2.step='0.1';
      editBox.appendChild(inp2);
    });

    // Género director select
    const gl=document.createElement('label'); gl.className='form-lbl'; gl.textContent='Género director/a'; editBox.appendChild(gl);
    const sel=document.createElement('select'); sel.id='ef-gendir-'+p.id;
    [['','Sin dato'],['M','Director (hombre)'],['F','Directora (mujer)']].forEach(([v,t])=>{
      const o=document.createElement('option'); o.value=v; o.textContent=t; if((p.genero_director||'')=== v) o.selected=true; sel.appendChild(o);
    });
    editBox.appendChild(sel);

    const eRow=document.createElement('div'); eRow.className='edit-row';
    const sv=document.createElement('button'); sv.className='sv'; sv.textContent='Guardar';
    sv.addEventListener('click', async()=>{
      try{
        const fanota=parseFloat(document.getElementById('ef-fanota-'+p.id).value)||null;
        await dbPatch('peliculas',`id=eq.${p.id}`,{
          titulo:document.getElementById('ef-titulo-'+p.id).value.trim(),
          director:document.getElementById('ef-dir-'+p.id).value.trim()||null,
          fecha_sesion:document.getElementById('ef-fecha-'+p.id).value||null,
          pais:document.getElementById('ef-pais-'+p.id).value.trim()||null,
          fa_nota:fanota,
          filmaffinity_url:document.getElementById('ef-fa-'+p.id).value.trim()||null,
          genero_director:document.getElementById('ef-gendir-'+p.id).value||null
        });
        toast('Guardado'); await loadAll(); renderAll();
      }catch(e){ toast('Error: '+e.message); }
    });
    const cv2=document.createElement('button'); cv2.className='cv'; cv2.textContent='Cancelar';
    cv2.addEventListener('click',()=>editBox.classList.add('off'));
    const dv=document.createElement('button'); dv.className='cv'; dv.style.color='var(--rojo)'; dv.textContent='Borrar';
    dv.addEventListener('click', async()=>{
      if(!confirm('¿Borrar "'+p.titulo+'" y todos sus votos?')) return;
      try{
        await dbDel('votos',`pelicula_id=eq.${p.id}`);
        await dbDel('comentarios',`pelicula_id=eq.${p.id}`).catch(()=>{});
        await dbDel('tertulia_votos',`pelicula_id=eq.${p.id}`).catch(()=>{});
        await dbDel('cartel_votos',`pelicula_id=eq.${p.id}`).catch(()=>{});
        await dbDel('peliculas',`id=eq.${p.id}`);
        toast('Eliminada'); await loadAll(); renderAll();
      }catch(e){ toast('Error: '+e.message); }
    });
    eRow.appendChild(sv); eRow.appendChild(cv2); eRow.appendChild(dv);
    editBox.appendChild(eRow);
    row.addEventListener('click',()=>editBox.classList.toggle('off'));
    wrap.appendChild(row); wrap.appendChild(editBox); el.appendChild(wrap);
  });
}

// ============ DETALLE OVERLAY CLOSE ============
document.getElementById('m-detalle').addEventListener('click',e=>{ if(e.target===e.currentTarget) hideModal('m-detalle'); });

// ============ INIT ============
const saved=localStorage.getItem('ab_user');
if(saved){ try{ ME=JSON.parse(saved); startApp(); }catch(e){ initLogin(); } }
else { initLogin(); }
